            const merged = (currentTempWorks || []).map((item, index) => normalizeTempWork(item, index));
            (importedTempWorks || []).forEach((item, index) => {
                const imported = normalizeTempWork(item, index);
                const existingIndex = merged.findIndex(work => String(work.id) === String(imported.id));
                if (existingIndex === -1) {
                    merged.push(imported);
                    return;
                }
                const freshness = compareTempWorkFreshness(merged[existingIndex], imported);
                if (freshness > 0) {
                    merged[existingIndex] = imported;
                }
            });
            return merged;
        }

        // === 日志 ===
        function addLog(projectId, action, detail) {
            const projects = getProjects();
            const project = projects.find(p => String(p.id) === String(projectId));
            if (!project) return;
            if (!project.logs) project.logs = [];
            project.logs.unshift(createLogEntry(action, detail));
            project.updatedAt = getCurrentTimestamp();
            project.version = Math.max(Number(project.version) || 1, 1) + 1;
            saveProjects(projects);
        }

        function openLogModal(projectId) {
            const projects = getProjects();
            const project = projects.find(p => p.id === projectId);
            if (!project) {
                alert('找不到项目');
                return;
            }
            document.getElementById('logModalTitle').textContent = `修改日志 - ${project.name}`;
            const logBody = document.getElementById('logBody');
            if (!project.logs || project.logs.length === 0) {
                logBody.innerHTML = '<div class="empty-log">暂无修改记录</div>';
            } else {
                logBody.innerHTML = project.logs.map(log => `
                    <div class="log-item">
                        <div>
                            <span class="log-time">${escapeHtml(log.time)}</span>
                            <span class="log-action">${escapeHtml(log.action)}</span>
                        </div>
                        ${log.detail ? `<div class="log-detail">${escapeHtml(log.detail)}</div>` : ''}
                    </div>
                `).join('');
            }
            document.getElementById('logModal').classList.add('show');
        }

        function closeLogModal() {
            document.getElementById('logModal').classList.remove('show');
        }

        // === 进度款计算 ===
        function updatePaymentFromPercent(index) {
            const total = parseFloat(document.getElementById('totalAmount').value);
            const percent = parseFloat(document.getElementById(`paymentPercent_${index}`).value);
            if (!isNaN(total) && !isNaN(percent)) {
                const amount = (total * percent / 100);
                document.getElementById(`paymentAmount_${index}`).value = amount.toFixed(2);
            }
        }

        function updatePaymentFromAmount(index) {
            const total = parseFloat(document.getElementById('totalAmount').value);
            const amount = parseFloat(document.getElementById(`paymentAmount_${index}`).value);
            if (!isNaN(total) && total > 0 && !isNaN(amount)) {
                const percent = (amount / total * 100);
                document.getElementById(`paymentPercent_${index}`).value = percent.toFixed(1);
            }
        }

        function updateTotalSummary() {
            const total = parseFloat(document.getElementById('totalAmount').value) || 0;
            let paidTotal = 0;
            for (let i = 0; i < 5; i++) {
                if (document.getElementById(`paymentPaid_${i}`).checked) {
                    const amount = parseFloat(document.getElementById(`paymentAmount_${i}`).value);
                    if (!isNaN(amount)) {
                        paidTotal += amount;
                    }
                }
            }
            const unpaidTotal = total - paidTotal;
            document.getElementById('paidTotal').textContent = `$${paidTotal.toFixed(2)}`;
            document.getElementById('unpaidTotal').textContent = `$${unpaidTotal.toFixed(2)}`;
        }

        function addOrderRow(item = {}) {
            const container = document.getElementById('orderItemsContainer');
            if (!container) return;
            const itemStatus = normalizeOrderStatus(item?.status);
            const statusOptions = ORDER_STATUSES.map(status => `<option value="${status}"${itemStatus === status ? ' selected' : ''}>${status}</option>`).join('');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><input type="text" class="order-item-name" value="${escapeHtml(item.name || '')}" placeholder="请输入名称"></td>
                <td><input type="text" class="order-item-quantity" value="${escapeHtml(item.quantity || '')}" placeholder="请输入数量"></td>
                <td>
                    <select class="order-item-status-select">
                        ${statusOptions}
                    </select>
                </td>
                <td><button type="button" class="btn-danger order-remove-btn">删除</button></td>
            `;
            const removeBtn = row.querySelector('.order-remove-btn');
            if (removeBtn) {
                removeBtn.addEventListener('click', () => row.remove());
            }
            container.appendChild(row);
        }

        function resetOrderRows(items = []) {
            const container = document.getElementById('orderItemsContainer');
            if (!container) return;
            container.innerHTML = '';
            if (!items || items.length === 0) {
                addOrderRow();
                return;
            }
            items.forEach(item => addOrderRow(item));
        }

        function collectOrderItemsFromForm() {
            const container = document.getElementById('orderItemsContainer');
            if (!container) return [];
            return Array.from(container.querySelectorAll('tr')).map(row => {
                const nameInput = row.querySelector('.order-item-name');
                const qtyInput = row.querySelector('.order-item-quantity');
                const statusSelect = row.querySelector('.order-item-status-select');
                return {
                    name: nameInput ? nameInput.value.trim() : '',
                    quantity: qtyInput ? qtyInput.value.trim() : '',
                    status: statusSelect ? normalizeOrderStatus(statusSelect.value) : '未定'
                };
            }).filter(item => item.name || item.quantity);
        }

        // === 安装补缺相关函数 ===
        function addInstallationDeficitRow(item = null, containerId = 'editInstallationDeficitsContainer') {
            const container = document.getElementById(containerId);
            if (!container) return;
            const row = document.createElement('tr');
            const itemId = item && item.id ? item.id : Date.now() + Math.random();
            row.dataset.deficitId = itemId;
            row.innerHTML = `
                <td><textarea class="deficit-content" placeholder="输入补缺内容" style="width: 100%; padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px; min-height: 45px; resize: vertical; font-family: inherit; font-size: 13px;">${item && item.content ? item.content.replace(/"/g, '&quot;') : ''}</textarea></td>
                <td>
                    <select class="deficit-status" style="width: 100%; padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px;">
                        ${INSTALLATION_DEFICIT_STATUSES.map(s => `<option value="${s}" ${item && item.status === s ? 'selected' : ''}>${s}</option>`).join('')}
                    </select>
                </td>
                <td><button type="button" class="btn-danger delete-deficit-btn" style="padding: 4px 8px; font-size: 12px;">删除</button></td>
            `;
            row.querySelector('.delete-deficit-btn').addEventListener('click', () => row.remove());
            container.appendChild(row);
        }

        function resetInstallationDeficitRows(items = [], containerId = 'editInstallationDeficitsContainer') {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = '';
            if (!items || items.length === 0) return;
            items.forEach(item => addInstallationDeficitRow(item, containerId));
        }

        function collectInstallationDeficitsFromForm(projectId, projectName) {
            const container = document.getElementById('editInstallationDeficitsContainer');
            if (!container) return [];
            return Array.from(container.querySelectorAll('tr')).map(row => {
                const contentInput = row.querySelector('.deficit-content');
                const statusSelect = row.querySelector('.deficit-status');
                return {
                    id: row.dataset.deficitId || Date.now() + Math.random(),
                    projectId: projectId,
                    projectName: projectName,
                    content: contentInput ? contentInput.value.trim() : '',
                    status: statusSelect ? statusSelect.value : '未生产'
                };
            }).filter(item => item.content);
        }

        // === 弹窗操作 ===
        function openAddModal() {
            document.getElementById('modalTitle').textContent = '添加新项目';
            document.getElementById('projectForm').reset();
            const today = new Date();
            const todayStr = new Date(today.getTime() - today.getTimezoneOffset() * 60000).toISOString().split('T')[0];
            document.getElementById('createDate').value = todayStr;
            document.getElementById('editId').value = '';

            // 清空 7 个阶段日期
            stages.forEach((s, i) => {
                document.getElementById(`stageDate_${i}`).value = '';
            });

            // 清空 5 个进度款输入框
            for (let i = 0; i < 5; i++) {
                document.getElementById(`paymentPercent_${i}`).value = '';
                document.getElementById(`paymentAmount_${i}`).value = '';
                document.getElementById(`paymentNote_${i}`).value = '';
                document.getElementById(`paymentPaid_${i}`).checked = false;
            }

            resetOrderRows();
            resetInstallationDeficitRows([]);

            document.getElementById('currentStage').value = '0';
            document.getElementById('projectFlag').value = '';
            updateTotalSummary();
            document.getElementById('modal').classList.add('show');
        }

        function openEditModal(projectId) {
            const projects = getProjects();
            const project = projects.find(p => p.id === projectId);
            if (!project) return;

            document.getElementById('modalTitle').textContent = '编辑项目';
            document.getElementById('editId').value = project.id;
            document.getElementById('projectName').value = project.name;
            document.getElementById('createDate').value = project.createDate;
            document.getElementById('expectedDate').value = project.expectedDate || '';
            document.getElementById('totalAmount').value = project.totalAmount || '';
            document.getElementById('currentStage').value = project.currentStage || 0;
            document.getElementById('projectFlag').value = normalizeProjectFlag(project.projectFlag);
            document.getElementById('description').value = project.description || '';

            stages.forEach((s, i) => {
                document.getElementById(`stageDate_${i}`).value = project.stageDates ? (project.stageDates[i] || '') : '';
            });

            // 填充进度款 - 先清空所有5个输入框，再填充已有数据
            for (let i = 0; i < 5; i++) {
                document.getElementById(`paymentPercent_${i}`).value = '';
                document.getElementById(`paymentAmount_${i}`).value = '';
                document.getElementById(`paymentNote_${i}`).value = '';
                document.getElementById(`paymentPaid_${i}`).checked = false;
            }
            if (project.progressPayments && Array.isArray(project.progressPayments)) {
                project.progressPayments.forEach((p, i) => {
                    if (p && i < 5) {
                        document.getElementById(`paymentPercent_${i}`).value = p.percent !== null ? p.percent : '';
                        document.getElementById(`paymentAmount_${i}`).value = p.amount !== null ? p.amount : '';
                        document.getElementById(`paymentNote_${i}`).value = p.note || '';
                        document.getElementById(`paymentPaid_${i}`).checked = !!p.paid;
                    }
                });
            }

            document.getElementById('deliveryType').value = project.deliveryType || '';
            resetOrderRows(project.orderItems || []);
            resetInstallationDeficitRows(project.installationDeficits || []);

            updateTotalSummary();
            document.getElementById('modal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }

        function saveProject() {
            const projects = getProjects();
            const editId = document.getElementById('editId').value;
            const existingProject = editId ? projects.find(p => String(p.id) === String(editId)) : null;

            // 收集各阶段日期
            const stageDates = {};
            stages.forEach((s, i) => {
                stageDates[i] = document.getElementById(`stageDate_${i}`).value || '';
            });

            // 收集进度款 - 保留索引语义，空位用 null 占位
            const progressPayments = [];
            for (let i = 0; i < 5; i++) {
                const percent = document.getElementById(`paymentPercent_${i}`).value;
                const amount = document.getElementById(`paymentAmount_${i}`).value;
                const note = document.getElementById(`paymentNote_${i}`).value;
                const paid = document.getElementById(`paymentPaid_${i}`).checked;
                progressPayments[i] = normalizePaymentItem({
                    percent: percent ? parseFloat(percent) : null,
                    amount: amount ? parseFloat(amount) : null,
                    note,
                    paid
                });
            }

            const orderItems = collectOrderItemsFromForm();
            const deliveryType = document.getElementById('deliveryType').value;
            const projectNameVal = document.getElementById('projectName').value.trim();
            const installationDeficits = collectInstallationDeficitsFromForm(existingProject ? existingProject.id : Date.now(), projectNameVal);

            const currentStage = parseInt(document.getElementById('currentStage').value, 10);
            const projectFlag = normalizeProjectFlag(document.getElementById('projectFlag').value);
            const nowTimestamp = getCurrentTimestamp();
            const project = normalizeProject({
                id: existingProject ? existingProject.id : Date.now(),
                name: document.getElementById('projectName').value.trim(),
                createDate: document.getElementById('createDate').value || new Date().toISOString().split('T')[0],
                expectedDate: document.getElementById('expectedDate').value,
                deliveryType: deliveryType,
                currentStage: currentStage,
                projectFlag,
                progress: stages[currentStage].progress,
                totalAmount: document.getElementById('totalAmount').value ? parseFloat(document.getElementById('totalAmount').value) : null,
                description: document.getElementById('description').value.trim(),
                stageDates: stageDates,
                progressPayments: progressPayments,
                orderItems: orderItems,
                installationDeficits: installationDeficits,
                logs: existingProject ? (existingProject.logs || []) : [],
                version: existingProject ? (Math.max(Number(existingProject.version) || 1, 1) + 1) : 1,
                updatedAt: nowTimestamp
            });

            if (existingProject) {
                const index = projects.findIndex(p => String(p.id) === String(project.id));
                if (index >= 0) {
                    const logs = [
                        createLogEntry('编辑项目', `修改为 ${stages[currentStage].name}`),
                        ...(existingProject.logs || [])
                    ];
                    if (normalizeProjectFlag(existingProject.projectFlag) !== projectFlag) {
                        logs.unshift(createLogEntry('更新项目状态', `${getProjectFlagLabel(existingProject.projectFlag)} → ${getProjectFlagLabel(projectFlag)}`));
                    }
                    // 检测安装补缺状态变更并添加日志
                    const oldDeficits = existingProject.installationDeficits || [];
                    installationDeficits.forEach(newDeficit => {
                        const oldDeficit = oldDeficits.find(d => String(d.id) === String(newDeficit.id));
                        if (oldDeficit && oldDeficit.status !== newDeficit.status) {
                            logs.unshift(createLogEntry('安装补缺状态变更', `${newDeficit.content}: ${oldDeficit.status} → ${newDeficit.status}`));
                        }
                    });
                    project.logs = logs;
                    projects[index] = normalizeProject(project);
                }
            } else {
                project.logs = [createLogEntry('创建项目', `初始阶段 ${stages[currentStage].name}`)];
                if (projectFlag) {
                    project.logs.unshift(createLogEntry('设置项目状态', getProjectFlagLabel(projectFlag)));
                }
                projects.unshift(normalizeProject(project));
            }

            saveProjects(projects);
            closeModal();
            renderCurrentPage();
            updateStats();
        }

        function deleteProject(id) {
            if (!confirm('确定要删除这个项目吗？')) return;
            let projects = getProjects();
            projects = projects.filter(p => p.id !== id);
            saveProjects(projects);
            renderCurrentPage();
            updateStats();
        }

        function moveToStage(projectId, newStage) {
            const projects = getProjects();
            const project = projects.find(p => String(p.id) === String(projectId));
            if (project) {
                const oldStageName = stages[project.currentStage].name;
                const newStageName = stages[newStage].name;
                project.currentStage = newStage;
                project.progress = stages[newStage].progress;
                project.updatedAt = getCurrentTimestamp();
                project.version = Math.max(Number(project.version) || 1, 1) + 1;
                if (!project.logs) project.logs = [];
                project.logs.unshift(createLogEntry('移动阶段', `${oldStageName} → ${newStageName}`));
                saveProjects(projects);
                renderCurrentPage();
                updateStats();
            }
        }

        function nextStage(id) {
            const projects = getProjects();
            const project = projects.find(p => p.id === id);
            if (project && project.currentStage < 6) {
                moveToStage(id, project.currentStage + 1);
            }
        }

        function prevStage(id) {
            const projects = getProjects();
            const project = projects.find(p => p.id === id);
            if (project && project.currentStage > 0) {
                moveToStage(id, project.currentStage - 1);
            }
        }

        // === 项目列表视图 ===
        function renderList() {
            const projects = getProjects();
            const searchText = document.getElementById('searchInput').value.toLowerCase().trim();
            const flagFilter = document.getElementById('flagFilter').value;
            const filtered = projects.filter(project => projectMatchesFilters(project, searchText, flagFilter));

            // 按预期完成日期排序
            filtered.sort((a, b) => {
                if (!a.expectedDate) return 1;
                if (!b.expectedDate) return -1;
                return a.expectedDate.localeCompare(b.expectedDate);
            });

            const container = document.getElementById('listContainer');
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #999; padding: 40px;">暂无匹配项目</div>';
                return;
            }

            container.innerHTML = filtered.map(project => {
                const stageInfo = stages[project.currentStage];
                const flagBadge = renderProjectFlagBadge(project.projectFlag);

                // 计算付款统计
                let paidTotal = 0;
                let totalPercent = 0;
                if (project.progressPayments && project.totalAmount) {
                    project.progressPayments.forEach(p => {
                        if (p && p.paid && p.amount) {
                            paidTotal += p.amount;
                        }
                        if (p && p.percent) {
                            totalPercent += p.percent;
                        }
                    });
                }

                let paymentHtml = '';
                if (project.totalAmount) {
                    paymentHtml = `| 总额: $${project.totalAmount.toFixed(2)} | 已收: $${paidTotal.toFixed(2)} (${Math.round(totalPercent)}%)`;
                }

                return `
                    <div class="list-item">
                        <div class="list-info">
                            <div class="list-title-row">
                                <div class="list-name">${escapeHtml(project.name)}</div>
                                ${flagBadge}
                            </div>
                            <div class="list-meta">
                                当前阶段：${stageInfo.name} | 进度：${stageInfo.progress}% 
                                ${project.deliveryType ? renderDeliveryTypeBadge(project.deliveryType) : ''}
                                ${project.expectedDate ? `| 预期完成：${project.expectedDate}` : ''}
                                ${paymentHtml}
                            </div>
                        </div>
                        <div class="list-actions">
                            ${project.currentStage > 0 ? `<button class="btn-success" onclick="prevStage(${project.id})">上一阶段</button>` : ''}
                            ${project.currentStage < 7 ? `<button class="btn-success" onclick="nextStage(${project.id})">下一阶段</button>` : ''}
                            <button class="btn-primary" onclick="openLogModal(${project.id})">日志</button>
                            <button class="btn-primary" onclick="openEditModal(${project.id})">编辑</button>
                            <button class="btn-danger" onclick="deleteProject(${project.id})">删除</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // === 看板视图 ===
        function renderBoard() {
            const projects = getProjects();
            const searchText = document.getElementById('searchInput').value.toLowerCase().trim();
            const flagFilter = document.getElementById('flagFilter').value;
            const filtered = projects.filter(project => projectMatchesFilters(project, searchText, flagFilter));
            const boardProjects = filtered.filter(project => project.currentStage !== 7);

            const grouped = {};
            kanbanStages.forEach(stage => {
                grouped[stage.id] = [];
            });
            boardProjects.forEach(project => {
                if (grouped[project.currentStage]) {
                    grouped[project.currentStage].push(project);
                }
            });

            kanbanStages.forEach(stage => {
                grouped[stage.id].sort((a, b) => {
                    const dateA = a.stageDates ? (a.stageDates[a.currentStage] || '') : '';
                    const dateB = b.stageDates ? (b.stageDates[b.currentStage] || '') : '';
                    if (!dateA) return 1;
                    if (!dateB) return -1;
                    return dateA.localeCompare(dateB);
                });
            });

            const board = document.getElementById('kanbanBoard');
            board.innerHTML = '';

            kanbanStages.forEach(stage => {
                const column = document.createElement('div');
                column.className = 'kanban-column';
                column.innerHTML = `
                    <div class="column-header">
                        ${stage.name}
                        <span class="count-badge">${grouped[stage.id].length}</span>
                    </div>
                `;

                if (grouped[stage.id].length === 0) {
                    column.innerHTML += '<div class="empty-column">暂无项目</div>';
                } else {
                    grouped[stage.id].forEach(project => {
                        const card = document.createElement('div');
                        card.className = 'kanban-card';
                        card.draggable = true;

                        const currentDate = project.stageDates ? (project.stageDates[project.currentStage] || '') : '';
                        const daysLeft = currentDate ? calculateDaysLeft(currentDate) : null;

                        let badge = '';
                        if (daysLeft !== null && daysLeft < 0) {
                            badge = `<span class="danger-badge">逾期 ${Math.abs(daysLeft)} 天</span>`;
                        } else if (daysLeft !== null && daysLeft <= 3) {
                            badge = `<span class="danger-badge">剩余 ${daysLeft} 天</span>`;
                        }

                        const flagBadge = renderProjectFlagBadge(project.projectFlag);
                        let isOverdue = daysLeft !== null && daysLeft < 0;
                        card.className += isOverdue ? ' overdue' : '';

                        let paidTotal = 0;
                        if (project.progressPayments && project.totalAmount) {
                            project.progressPayments.forEach(p => {
                                if (p && p.paid && p.amount) {
                                    paidTotal += p.amount;
                                }
                            });
                        }

                        let paymentInfo = '';
                        if (project.totalAmount) {
                            paymentInfo = `<div class="card-info" style="margin-top: 4px;">
                                <span>总额: $${project.totalAmount.toFixed(2)} | 已收: $${paidTotal.toFixed(2)}</span>
                            </div>`;
                        }

                        card.innerHTML = `
                            <div class="card-title-row">
                                <div class="card-title">${escapeHtml(project.name)}${project.deliveryType ? renderDeliveryTypeBadge(project.deliveryType) : ''}</div>
                            </div>
                            <div class="card-info">
                                <span>阶段：${stage.name}</span>
                                ${currentDate ? `<span class="card-stage-date">${currentDate}</span>` : ''}
                            </div>
                            ${(badge || flagBadge || project.deliveryType) ? `<div class="card-badge-row">${badge}${flagBadge}</div>` : ''}
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${stage.progress}%"></div>
                            </div>
                            ${paymentInfo}
                            <div class="card-actions">
                                ${project.currentStage > 0 ? `<button class="btn-success" onclick="prevStage(${project.id})">上一阶段</button>` : ''}
                                ${project.currentStage < 7 ? `<button class="btn-success" onclick="nextStage(${project.id})">下一阶段</button>` : ''}
                                <button class="btn-primary" onclick="openLogModal(${project.id})">日志</button>
                                <button class="btn-primary" onclick="openEditModal(${project.id})">编辑</button>
                                <button class="btn-danger" onclick="deleteProject(${project.id})">删除</button>
                            </div>
                        `;
                        card.addEventListener('dragstart', (e) => {
                            draggedProject = project;
                            card.classList.add('dragging');
                            e.dataTransfer.effectAllowed = 'move';
                        });
                        card.addEventListener('dragend', () => {
                            draggedProject = null;
                            card.classList.remove('dragging');
                        });

                        column.appendChild(card);
                    });
                }

                column.addEventListener('dragover', (e) => {
                    e.preventDefault();
                });
                column.addEventListener('drop', (e) => {
                    e.preventDefault();
                    if (draggedProject && draggedProject.currentStage !== stage.id) {
                        moveToStage(draggedProject.id, stage.id);
                    }
                });

                board.appendChild(column);
            });
        }

        function renderOrderPage() {
            const projects = getProjects();
            const filter = document.getElementById('orderItemStatusFilter').value;
            const searchText = document.getElementById('searchInput').value.toLowerCase().trim();
            const projectsWithData = projects.filter(projectHasOrderData);
            // 对每个项目，筛选出符合状态和搜索条件的订单项
            const filteredProjectsWithItems = projectsWithData.map(project => {
                const items = Array.isArray(project.orderItems) ? project.orderItems : [];
                // 先按状态过滤
                let filteredItems = filter === 'all'
                    ? items
                    : items.filter(item => normalizeOrderStatus(item?.status) === filter);
                // 再按搜索文本过滤订购内容
                if (searchText) {
                    filteredItems = filteredItems.filter(item => {
                        const haystacks = [
                            project.name || '',
                            item.name || '',
                            item.quantity || '',
                            normalizeOrderStatus(item?.status)
                        ].map(v => String(v).toLowerCase());
                        return haystacks.some(v => v.includes(searchText));
                    });
                }
                return {
                    ...project,
                    filteredOrderItems: filteredItems
                };
            }).filter(project => project.filteredOrderItems.length > 0);

            filteredProjectsWithItems.sort((a, b) => {
                if (a.currentStage !== b.currentStage) return a.currentStage - b.currentStage;
                if ((a.expectedDate || '') !== (b.expectedDate || '')) return (a.expectedDate || '').localeCompare(b.expectedDate || '');
                return (a.name || '').localeCompare(b.name || '');
            });

            const container = document.getElementById('orderProjectsContainer');
            if (!container) return;
            if (filteredProjectsWithItems.length === 0) {
                container.innerHTML = '<div class="empty-column">暂无符合筛选条件的订购信息</div>';
                return;
            }

            container.innerHTML = filteredProjectsWithItems.map(project => {
                const stageInfo = stages[project.currentStage] || {};
                const items = project.filteredOrderItems;
                const rows = items.length
                    ? items.map(item => {
                        const itemStatus = normalizeOrderStatus(item?.status);
                        const statusOptions = ORDER_STATUSES.map(status => `<option value="${status}"${itemStatus === status ? ' selected' : ''}>${status}</option>`).join('');
                        return `
                            <tr>
                                <td>${escapeHtml(item.name)}</td>
                                <td>${escapeHtml(item.quantity || '-')}</td>
                                <td>
                                    <select class="order-item-status-select" onchange="updateOrderItemStatus(${project.id}, this.parentElement.parentElement.rowIndex - 1, this.value)">
                                        ${statusOptions}
                                    </select>
                                </td>
                            </tr>
                        `;
                    }).join('')
                    : '<tr class="order-empty-row"><td colspan="3">暂无订购项，点击编辑填写</td></tr>';
                return `
                    <div class="order-project-group">
                        <div class="list-title-row">
                            <div class="list-name">${escapeHtml(project.name)}</div>
                            <div class="card-actions">
                                <button class="btn-primary" onclick="openEditModal(${project.id})">编辑</button>
                            </div>

        function updateOrderItemStatus(projectId, itemIndex, status) {
            const projects = getProjects();
            const index = projects.findIndex(p => String(p.id) === String(projectId));
            if (index === -1) return;
            const normalized = normalizeOrderStatus(status);
            if (projects[index].orderItems && projects[index].orderItems[itemIndex]) {
                projects[index].orderItems[itemIndex].status = normalized;
            }
            projects[index].updatedAt = getCurrentTimestamp();
            projects[index].version = Math.max(Number(projects[index].version) || 1, 1) + 1;
            saveProjects(projects);
            updateStats();

        // === 安装补缺页面 ===
        function renderInstallationDeficitPage() {
            const projects = getProjects();
            const searchText = document.getElementById('searchInput').value.toLowerCase().trim();
            const allDeficits = [];
            projects.forEach(project => {
                if (project.installationDeficits && Array.isArray(project.installationDeficits)) {
                    project.installationDeficits.forEach(deficit => {
                        allDeficits.push({

                            projectId: project.id,
                            projectName: project.name
                        });
                    });
                }
            });

            // 根据安装补缺内容和项目名称搜索
            const filteredDeficits = searchText
                ? allDeficits.filter(deficit => {
                    const haystacks = [
                        deficit.projectName || '',
                        deficit.content || '',
                        deficit.status || ''
                    ].map(v => String(v).toLowerCase());
                    return haystacks.some(v => v.includes(searchText));
                })
                : allDeficits;

            const tbody = document.getElementById('installationDeficitTableBody');
            if (!tbody) return;

            if (filteredDeficits.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: #999; padding: 30px;">${searchText ? '无匹配的安装补缺记录' : '暂无安装补缺记录'}</td></tr>`;

            tbody.innerHTML = filteredDeficits.map(deficit => {

                return `
                    <tr data-project-id="${deficit.projectId}" data-deficit-id="${deficit.id}">
                        <td>
                            <input type="text" class="deficit-project-search" 
                                   value="${escapeHtml(deficit.projectName)}" 
                                   placeholder="搜索项目..." 
                                   data-deficit-id="${deficit.id}"
                                   data-original-project-id="${deficit.projectId}"
                                   onfocus="showProjectSearchList(this)"
                                   oninput="filterProjectSearchList(this)"
                                   onblur="hideProjectSearchList(this)">
                            <div class="project-search-dropdown" data-deficit-id="${deficit.id}"></div>
                        </td>
                        <td><textarea class="deficit-content-input" onchange="updateInstallationDeficitContent(${deficit.id}, this.value)" style="width: 100%; padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px; min-height: 50px; resize: vertical; font-family: inherit; font-size: 13px;">${escapeHtml(deficit.content)}</textarea></td>
                        <td>
                            <select class="deficit-status-select" onchange="updateInstallationDeficitStatus(${deficit.projectId}, ${deficit.id}, this.value)">
                                ${statusOptions}
                            </select>
                        </td>
                        <td><button class="btn-danger" onclick="deleteInstallationDeficit(${deficit.projectId}, ${deficit.id})" style="padding: 4px 8px; font-size: 12px;">删除</button></td>
                    </tr>
                `;
            }).join('');
        }

        function updateInstallationDeficitProject(deficitId, newProjectId) {
            if (!newProjectId) return;
            const projects = getProjects();
            const projectsWithDeficit = projects.filter(p => p.installationDeficits && p.installationDeficits.some(d => String(d.id) === String(deficitId)));
            if (projectsWithDeficit.length > 0) {
                const oldProject = projectsWithDeficit[0];
                const deficit = oldProject.installationDeficits.find(d => String(d.id) === String(deficitId));
                if (deficit && String(oldProject.id) !== String(newProjectId)) {
                    // 从原项目删除
                    oldProject.installationDeficits = oldProject.installationDeficits.filter(d => String(d.id) !== String(deficitId));
                    oldProject.updatedAt = getCurrentTimestamp();
                    oldProject.version = Math.max(Number(oldProject.version) || 1, 1) + 1;
                    // 添加到新项目
                    const newProject = projects.find(p => String(p.id) === String(newProjectId));
                    if (newProject) {
                        deficit.projectId = newProject.id;
                        deficit.projectName = newProject.name;
                        if (!newProject.installationDeficits) newProject.installationDeficits = [];
                        newProject.installationDeficits.push(deficit);
                        newProject.updatedAt = getCurrentTimestamp();
                        newProject.version = Math.max(Number(newProject.version) || 1, 1) + 1;
                    }
                    saveProjects(projects);
                    renderInstallationDeficitPage();
                }
            }
        }

        function updateInstallationDeficitContent(deficitId, content) {
            const projects = getProjects();
            projects.forEach(project => {
                if (project.installationDeficits) {
                    const deficit = project.installationDeficits.find(d => String(d.id) === String(deficitId));
                    if (deficit) {
                        deficit.content = content;
                        project.updatedAt = getCurrentTimestamp();
                        project.version = Math.max(Number(project.version) || 1, 1) + 1;
                    }
                }
            });
            saveProjects(projects);
        }

        function updateInstallationDeficitStatus(projectId, deficitId, status) {
            const projects = getProjects();
            const project = projects.find(p => String(p.id) === String(projectId));
            if (project && project.installationDeficits) {
                const deficit = project.installationDeficits.find(d => String(d.id) === String(deficitId));
                if (deficit && deficit.status !== status) {
                    const oldStatus = deficit.status;
                    deficit.status = status;
                    if (!project.logs) project.logs = [];
                    project.logs.unshift(createLogEntry('安装补缺状态变更', `${deficit.content}: ${oldStatus} → ${status}`));
                    project.updatedAt = getCurrentTimestamp();
                    project.version = Math.max(Number(project.version) || 1, 1) + 1;
                    saveProjects(projects);
                    renderInstallationDeficitPage();
                }
            }
        }

        function deleteInstallationDeficit(projectId, deficitId) {
            if (!confirm('确定要删除这条安装补缺记录吗？')) return;
            const projects = getProjects();
            const project = projects.find(p => String(p.id) === String(projectId));
            if (project && project.installationDeficits) {
                project.installationDeficits = project.installationDeficits.filter(d => String(d.id) !== String(deficitId));
                project.updatedAt = getCurrentTimestamp();
                project.version = Math.max(Number(project.version) || 1, 1) + 1;
                saveProjects(projects);
                renderInstallationDeficitPage();
            }
        }

        function addGlobalInstallationDeficit() {
            const projects = getProjects();
            if (projects.length === 0) {
                alert('请先创建项目');
                return;

            const defaultProject = projects[0];

            defaultProject.updatedAt = getCurrentTimestamp();
