<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生产项目管理</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: #f0f2f5;
            padding: 15px;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 4px;
            font-size: 24px;
        }

        .page-title {
            position: relative;
            margin-bottom: 15px;
        }

        .version-info {
            position: absolute;
            right: 0;
            bottom: 2px;
            font-size: 11px;
            color: #9aa1ab;
            letter-spacing: 0.2px;
            user-select: none;
        }

        .toolbar {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .toolbar input, .toolbar select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .toolbar input[type="text"] {
            flex: 1;
            min-width: 200px;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-primary {
            background-color: #1677ff;
            color: white;
        }

        .btn-primary:hover {
            background-color: #4096ff;
        }

        /* 安装补缺页面样式 */
        .deficit-project-search {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            box-sizing: border-box;
        }

        .project-search-dropdown {
            position: absolute;
            width: calc(100% - 2px);
            max-height: 250px;
            overflow-y: auto;
            background: white;
            border: 1px solid #ddd;
            border-top: none;
            border-radius: 0 0 4px 4px;
            z-index: 100;
            display: none;
            margin-top: -1px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .project-search-dropdown.show {
            display: block;
        }

        .project-search-item {
            padding: 8px 10px;
            cursor: pointer;
            font-size: 13px;
            border-bottom: 1px solid #f5f5f5;
        }

        .project-search-item:hover {
            background-color: #e6f4ff;
        }

        .project-search-item.selected {
            background-color: #1677ff;
            color: white;
        }

        .project-search-item.empty {
            color: #999;
            font-style: italic;
        }

        .deficit-status-select {
            padding: 6px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            width: 100%;
        }

        #installationDeficitTableBody td:first-child {
            position: relative;
            min-width: 200px;
        }

        .btn-danger {
            background-color: #ff4d4f;
            color: white;
        }

        .btn-danger:hover {
            background-color: #ff7875;
        }

        .btn-success {
            background-color: #52c41a;
            color: white;
        }

        .btn-success:hover {
            background-color: #73d13d;
        }

        /* === 页面容器 === */
        .page-view {
            display: none;
        }
        .page-view.active {
            display: block;
        }

        /* === 项目列表视图 === */
        .list-container {
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .list-item {
            border-bottom: 1px solid #f0f0f0;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .list-info {
            flex: 1;
        }

        .list-name {
            font-weight: 600;
            font-size: 15px;
            color: #333;
        }

        .list-meta {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .list-actions {
            display: flex;
            gap: 5px;
        }

        .list-actions button {
            padding: 4px 8px;
            font-size: 12px;
        }

        /* === 看板视图 === */
        .kanban-board {
            display: grid;
            grid-template-columns: repeat(7, minmax(220px, 1fr));
            gap: 12px;
        }

        /* 配送方式标签样式 */
        .delivery-type-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
            margin-left: 6px;
        }
        .delivery-type-badge.delivery-self {
            background: #fff7e6;
            color: #fa8c16;
            border: 1px solid #ffd591;
        }
        .delivery-type-badge.delivery-delivery {
            background: #f0f5ff;
            color: #2f54eb;
            border: 1px solid #adc6ff;
        }
        .delivery-type-badge.delivery-install {
            background: #f6ffed;
            color: #52c41a;
            border: 1px solid #b7eb8f;
        }

        .kanban-column {
            background: white;
            border-radius: 8px;
            padding: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            min-height: 500px;
        }

        .column-header {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .count-badge {
            background: #eee;
            padding: 2px 6px;
            border-radius: 8px;
            font-size: 11px;
            color: #666;
        }

        .kanban-card {
            border: 1px solid #e8e8e8;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 8px;
            background: #fafafa;
            cursor: grab;
            transition: transform 0.2s;
        }

        .kanban-card:hover {
            transform: translateY(-1px);
        }

        .kanban-card.dragging,
        .calendar-event.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        .card-title {
            font-weight: 600;
            font-size: 13px;
            color: #333;
            margin-bottom: 6px;
            word-break: break-word;
        }

        .card-info {
            font-size: 11px;
            color: #666;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }

        .card-stage-date {
            color: #1677ff;
            font-weight: 500;
        }

        .progress-bar {
            width: 100%;
            height: 5px;
            background-color: #f0f0f0;
            border-radius: 3px;
            overflow: hidden;
            margin: 6px 0;
        }

        .progress-fill {
            height: 100%;
            background-color: #52c41a;
        }

        .overdue {
            background: #fff1f0;
            border-color: #ffa39e;
        }

        .danger-badge {
            background: #ffccc7;
            color: #cf1322;
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 600;
        }

        .project-flag-badge {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            line-height: 1.4;
            margin-left: 8px;
            white-space: nowrap;
        }

        .flag-normal {
            background: #f5f5f5;
            color: #666;
        }

        .flag-follow_up {
            background: #fff7e6;
            color: #d46b08;
        }

        .flag-on_hold {
            background: #fffbe6;
            color: #ad8b00;
        }

        .list-title-row, .card-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            flex-wrap: wrap;
        }

        .card-title-row {
            margin-bottom: 6px;
        }

        .card-title {
            margin-bottom: 0;
        }

        .card-badge-row {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 6px;
        }

        .card-badge-row .project-flag-badge {
            margin-left: 0;
        }

        .list-title-row .project-flag-badge {
            margin-left: 0;
        }

        .card-actions {
            margin-top: 8px;
            display: flex;
            gap: 4px;
            justify-content: flex-end;
        }

        .card-actions button {
            padding: 3px 6px;
            font-size: 11px;
        }

        .empty-column {
            text-align: center;
            color: #999;
            padding: 20px;
            font-size: 12px;
        }

        /* === 日历视图 === */
        .calendar-container {
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .calendar-month {
            font-size: 18px;
            font-weight: 600;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .calendar-weekday {
            text-align: center;
            font-weight: 600;
            padding: 8px;
            color: #666;
            background: #f5f5f5;
            border-radius: 4px;
            font-size: 13px;
        }

        .calendar-day {
            min-height: 100px;
            border: 1px solid #e8e8e8;
            border-radius: 6px;
            padding: 6px;
            background: white;
            position: relative;
        }

        .calendar-day.today {
            background: #e6f7ff;
            border-color: #1890ff;
        }

        .calendar-day.other-month {
            background: #fafafa;
            color: #ccc;
        }

        .day-number {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .add-temp-btn {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #52c41a;
            color: white;
            border: none;
            font-size: 14px;
            line-height: 18px;
            padding: 0;
            cursor: pointer;
        }

        .calendar-event {
            font-size: 11px;
            padding: 2px 4px;
            margin-bottom: 3px;
            border-radius: 3px;
            background: #f0f0f0;
            cursor: pointer;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .calendar-event.project {
            font-weight: 500;
            border-left: 3px solid rgba(0, 0, 0, 0.08);
        }

        .calendar-event.project.calendar-event-stage-default {
            background: #f0f0f0;
            color: #595959;
        }

        .calendar-event.project.calendar-event-stage-0 {
            background: #fff2f0;
            color: #cf1322;
            border-left-color: #ff7875;
        }

        .calendar-event.project.calendar-event-stage-1 {
            background: #fff7e6;
            color: #d48806;
            border-left-color: #ffc069;
        }

        .calendar-event.project.calendar-event-stage-2 {
            background: #fffbe6;
            color: #ad8b00;
            border-left-color: #ffd666;
        }

        .calendar-event.project.calendar-event-stage-3 {
            background: #f6ffed;
            color: #389e0d;
            border-left-color: #95de64;
        }

        .calendar-event.project.calendar-event-stage-4 {
            background: #e6fffb;
            color: #08979c;
            border-left-color: #5cdbd3;
        }

        .calendar-event.project.calendar-event-stage-5 {
            background: #e6f7ff;
            color: #096dd9;
            border-left-color: #69c0ff;
        }

        .calendar-event.project.calendar-event-stage-6 {
            background: #f0f5ff;
            color: #531dab;
            border-left-color: #85a5ff;
        }

        .calendar-event.project.calendar-event-stage-7 {
            background: #f9f0ff;
            color: #722ed1;
            border-left-color: #b37feb;
        }

        .calendar-event.project.calendar-event-stage-expected {
            background: #fffbe6;
            color: #ad8b00;
            border-left-color: #ffd666;
        }

        .calendar-event.temp {
            background: #f6ffed;
            color: #52c41a;
        }

        /* === 弹窗 === */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 8px;
            width: 95%;
            max-width: 1200px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 18px;
            margin: 0;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
            padding: 0;
            width: 30px;
            height: 30px;
            line-height: 30px;
        }

        .modal-body {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }

        /* 每个阶段日期 */
        .stage-dates {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .stage-date-item {
            display: flex;
            flex-direction: column;
        }

        .stage-date-item label {
            font-size: 12px;
        }

        .modal-footer {
            padding: 15px 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* 统计信息 */
        .stats {
            display: flex;
            gap: 20px;
            margin-left: auto;
            font-size: 13px;
            color: #666;
        }

        /* 日志弹窗 */
        .log-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1001;
            justify-content: center;
            align-items: center;
        }

        .log-modal.show {
            display: flex;
        }

        .log-container {
            background: white;
            border-radius: 8px;
            width: 90%;
            max-width: 1000px;
            max-height: 70vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .log-header {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .log-header h2 {
            font-size: 18px;
            margin: 0;
        }

        .log-body {
            padding: 15px;
            overflow-y: auto;
            flex: 1;
        }

        .log-item {
            padding: 10px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
        }

        .log-time {
            color: #999;
            font-size: 12px;
        }

        .log-action {
            font-weight: 600;
            color: #1677ff;
            margin-left: 10px;
        }

        .log-detail {
            margin-top: 5px;
            color: #666;
        }

        .empty-log {
            text-align: center;
            color: #999;
            padding: 30px;
        }

        /* 进度款样式 */
        .progress-payment-item {
            display: grid;
            grid-template-columns: 80px 100px 100px 1fr auto;
            gap: 8px;
            align-items: end;
            padding: 10px;
            border: 1px solid #eee;
            border-radius: 4px;
            margin-bottom: 8px;
            background: #fafafa;
        }

        .progress-payment-item label {
            font-size: 12px;
            margin: 0;
        }

        .progress-payment-item input {
            padding: 6px 8px;
            font-size: 13px;
        }

        .progress-payment-item .paid-checkbox {
            display: flex;
            align-items: center;
            gap: 4px;
            padding-bottom: 6px;
        }

        .progress-payment-item .paid-checkbox input {
            width: auto;
            margin: 0;
        }

        /* 临时工作 */
        .temp-item {
            background: #fafafa;
            border: 1px solid #e8e8e8;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 8px;
        }

        .temp-item-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .temp-item-meta {
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
        }

        .temp-item-actions {
            text-align: right;
        }

        .temp-item-actions button {
            padding: 3px 8px;
            font-size: 12px;
        }

        @media (max-width: 1600px) {
            .kanban-board {
                grid-template-columns: repeat(4, minmax(200px, 1fr));
            }
        }

        @media (max-width: 1024px) {
            .kanban-board {
                grid-template-columns: 1fr;
            }
            /* calendar-grid grid-template-columns 由JS动态设置，不在这里写死 */
            .stats {
                width: 100%;
                order: 3;
                justify-content: space-between;
            }
        }

        @media (max-width: 600px) {
            .calendar-header {
                flex-direction: column;
                gap: 10px;
            }
        }

        @media (max-width: 600px) {
            .progress-payment-item {
                grid-template-columns: 1fr 1fr;
            }

            .version-info {
                position: static;
                display: block;
                text-align: center;
                margin-top: 2px;
            }
        }
        .order-page .order-project-group {
            border: 1px solid #f0f0f0;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 16px;
            background: #fff;
        }
        .order-items-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 10px;
            font-size: 13px;
        }
        .order-items-table th,
        .order-items-table td {
            border: 1px solid #eee;
            padding: 8px;
            text-align: left;
        }
        .order-items-table th {
            background: #fafafa;
        }
        .order-item-status-select {
            min-width: 90px;
            padding: 4px 6px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
        }
        .order-items-table td input {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
        }
        .order-items-table tr.order-empty-row td {
            text-align: center;
            color: #999;
        }
        .order-remove-btn {
            padding: 4px 10px;
            font-size: 12px;
        }
        .order-status-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .order-status-select {
            min-width: 140px;
            padding: 6px 10px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
        .delivered-project-card {
            border: 1px solid #f0f0f0;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 14px;
            background: #fff;
        }
        .delivered-project-card.unpaid {
            border-color: #ff4d4f;
            background: #fff2f0;
        }
        .delivered-project-card .list-title-row {
            margin-bottom: 6px;
        }
        .delivered-project-card .card-info {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 13px;
            color: #666;
            margin-top: 2px;
        }
        .delivered-project-card .card-actions button {
            padding: 4px 10px;
            font-size: 12px;
        }
        .delivered-summary {
            border: 1px solid #f0f0f0;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 14px;
            background: #fff;
        }
        .delivered-summary-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 8px;
            gap: 12px;
            font-weight: 600;
            color: #333;
        }
        .delivered-summary-controls {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #444;
        }
        .delivered-summary-controls label {
            font-weight: 600;
        }
        .delivered-summary-controls select {
            padding: 6px 10px;
            border-radius: 4px;
            border: 1px solid #ddd;
            font-size: 13px;
            background: #fff;
        }
        .delivered-summary-selected {
            text-align: right;
            min-width: 200px;
        }
        .delivered-summary-selected .delivered-summary-label {
            font-size: 13px;
            color: #555;
        }
        .delivered-summary-selected .delivered-summary-amount {
            font-size: 20px;
            font-weight: 600;
            color: #1677ff;
        }
        .delivered-summary-selected .delivered-summary-count {
            font-size: 12px;
            color: #777;
        }
        .delivered-summary-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .delivered-summary-card {
            flex: 1 1 180px;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            padding: 12px 14px;
            background: #fafafa;
            min-width: 180px;
            transition: border 0.2s, box-shadow 0.2s;
        }
        .delivered-summary-card.selected {
            border-color: #1677ff;

            color: #999;
            font-size: 13px;
            text-align: center;
            padding: 10px 0;

    </style>
</head>
<body>
    <div class="container">

                <option value="follow_up">跟进</option>

        </div>

        <!-- 项目列表页面 -->
        <div id="listPage" class="page-view active">
            <div class="list-container" id="listContainer">
                <div style="text-align: center; color: #999; padding: 40px;">暂无项目</div>
            </div>
        </div>

        <!-- 看板页面 -->
        <div id="kanbanPage" class="page-view">
            <div class="kanban-board" id="kanbanBoard"></div>
        </div>

        <!-- 日历页面 -->
        <div id="calendarPage" class="page-view">
            <div class="calendar-container">
                <div class="calendar-header" style="flex-wrap: wrap;">
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <label for="calendarView" style="margin: 0; white-space: nowrap; line-height: 34px;">视图：</label>
                        <select id="calendarView" style="width: 80px; height: 34px; margin: 0; line-height: 34px;">
                            <option value="day">日</option>
                            <option value="week">周</option>
                            <option value="month" selected>月</option>
                        </select>
                    </div>
                    <div class="calendar-month" id="calendarMonth"></div>
                    <div>
                        <button class="btn-primary" id="prevCalendar">&lt; 上一页</button>
                        <button class="btn-primary" id="nextCalendar">下一页 &gt;</button>
                    </div>
                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>
        </div>

        <!-- 订购页面 -->
        <div id="orderPage" class="page-view">
            <div class="list-container order-page">
                <div class="list-title-row" style="margin-bottom: 12px; justify-content: space-between;">
                    <div class="list-name">订购清单</div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <label for="orderItemStatusFilter" style="margin: 0; white-space: nowrap;">状态筛选：</label>
                        <select id="orderItemStatusFilter">
                            <option value="all">全部</option>
                            <option value="未定">未定</option>
                            <option value="已定">已定</option>
                            <option value="已付款">已付款</option>
                        </select>
                    </div>
                </div>
                <div class="list-meta" style="margin-bottom: 12px;">按项目分组查看采购/订购项，变更状态即可同步保存。</div>
                <div id="orderProjectsContainer"></div>
            </div>
        </div>

        <!-- 安装补缺页面 -->
        <div id="installationDeficitPage" class="page-view">
            <div class="list-header">
                <div class="list-name">安装补缺清单</div>
            </div>
            <div class="list-meta" style="margin-bottom: 15px;">按项目管理安装补缺内容，状态变更自动写入项目修改日志。</div>
            <div class="toolbar">
                <button type="button" class="btn-primary" id="addInstallationDeficitBtn">+ 新增补缺</button>
            </div>
            <table class="kanban-project-table" style="margin-top: 15px; width: 100%;">
                <thead>
                    <tr>
                        <th style="width: 25%;">项目名称</th>
                        <th style="width: 50%;">补缺内容</th>
                        <th style="width: 15%;">状态</th>

                    </tr>
                </thead>
                <tbody id="installationDeficitTableBody">
                    <!-- 动态生成 -->
                </tbody>
            </table>
        </div>

        <!-- Delivered 页面 -->
        <div id="deliveredPage" class="page-view">
            <div class="list-container">
                <div class="list-title-row" style="justify-content: space-between;">
                    <div class="list-name">Delivered 已交付</div>
                    <span class="list-meta">已交付项目在此页面集中管理。</span>
                </div>
                <div class="delivered-filters" style="display: flex; gap: 16px; align-items: center; margin-bottom: 12px; flex-wrap: wrap;">
                    <div style="display: flex; align-items: center; gap: 6px;">
                        <label style="margin: 0; font-size: 13px;">开始日期：</label>
                        <input type="date" id="deliveredDateStart" style="padding: 4px 6px; border: 1px solid #ddd; border-radius: 4px;">
                    </div>
                    <div style="display: flex; align-items: center; gap: 6px;">
                        <label style="margin: 0; font-size: 13px;">结束日期：</label>
                        <input type="date" id="deliveredDateEnd" style="padding: 4px 6px; border: 1px solid #ddd; border-radius: 4px;">
                    </div>
                    <div style="display: flex; align-items: center; gap: 6px;">
                        <label style="margin: 0; font-size: 13px;">付款状态：</label>
                        <select id="deliveredPaymentFilter" style="padding: 4px 6px; border: 1px solid #ddd; border-radius: 4px;">
                            <option value="all">全部</option>
                            <option value="paid">已付清</option>
                            <option value="unpaid">未付清</option>
                        </select>
                    </div>
                    <div style="display: flex; align-items: center; gap: 6px;">
                        <label style="margin: 0; font-size: 13px;">排序：</label>
                        <select id="deliveredSortBy" style="padding: 4px 6px; border: 1px solid #ddd; border-radius: 4px;">
                            <option value="deliveredDate-desc">交付日期 → 新→旧</option>
                            <option value="deliveredDate-asc">交付日期 → 旧→新</option>
                            <option value="totalAmount-desc">总金额 → 高→低</option>
                            <option value="unpaid-desc">未收款 → 高→低</option>
                        </select>
                    </div>
                </div>
                <div id="deliveredSummaryContainer" class="delivered-summary"></div>
                <div id="deliveredProjectsContainer"></div>
            </div>
        </div>
    </div>

    <!-- 添加/编辑项目弹窗 -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">添加新项目</h2>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="projectForm">
                    <input type="hidden" id="editId">
                    <div class="form-group">
                        <label for="projectName">项目名称/地址 *</label>
                        <input type="text" id="projectName" required placeholder="请输入项目名称或地址">
                    </div>

                    <div class="form-group">
                        <label for="createDate">创建日期</label>
                        <input type="date" id="createDate">
                    </div>

                    <div class="form-group">
                        <label for="expectedDate">预期完成日期</label>
                        <input type="date" id="expectedDate">
                    </div>

                    <div class="form-group">
                        <label>各阶段计划日期</label>
                        <div class="stage-dates" id="stageDatesContainer">
                            <!-- 动态生成 -->
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="totalAmount">项目总金额 ($)</label>
                        <input type="number" id="totalAmount" step="0.01" placeholder="输入项目总金额">
                    </div>

                    <div class="form-group">
                        <label>进度款（最多5笔）</label>
                        <div id="progressPaymentsContainer">
                            <!-- 5个进度款输入框 -->
                        </div>
                        <div style="margin-top: 10px; padding: 10px; background: #f5f5f5; border-radius: 4px;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                                <span>已付总额：</span>
                                <strong id="paidTotal">$0.00</strong>
                            </div>
                            <div style="display: flex; justify-content: space-between;">
                                <span>未付总额：</span>
                                <strong id="unpaidTotal" style="color: #cf1322;">$0.00</strong>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="deliveryType">配送方式</label>
                        <select id="deliveryType">
                            <option value="">无</option>
                            <option value="自取">自取</option>
                            <option value="送货">送货</option>
                            <option value="安装">安装</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>订购清单</label>
                        <table class="order-items-table">
                            <thead>
                                <tr>
                                    <th>名称</th>
                                    <th>数量</th>
                                    <th>状态</th>
                                    <th style="width: 90px;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="orderItemsContainer">
                                <!-- 动态生成 -->
                            </tbody>
                        </table>
                        <button type="button" class="btn-primary" id="addOrderRowBtn">+ 添加行</button>
                        <div class="list-meta" style="margin-top: 6px;">至少填写名称与数量，保存后会同步到订购页面。</div>
                    </div>

                    <div class="form-group">
                        <label for="currentStage">当前所处阶段</label>
                        <select id="currentStage"></select>
                    </div>

                    <div class="form-group">
                        <label for="projectFlag">项目状态标签</label>
                        <select id="projectFlag">
                            <option value="">正常</option>
                            <option value="follow_up">跟进</option>
                            <option value="on_hold">On Hold</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>安装补缺</label>
                        <table class="order-items-table" id="editInstallationDeficitsTable">
                            <thead>
                                <tr>
                                    <th>补缺内容</th>
                                    <th style="width: 120px;">状态</th>
                                    <th style="width: 90px;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="editInstallationDeficitsContainer">
                                <!-- 动态生成 -->
                            </tbody>
                        </table>
                        <button type="button" class="btn-primary" id="addEditInstallationDeficitBtn">+ 添加行</button>
                    </div>

                    <div class="form-group">
                        <label for="description">备注 / 联系人信息</label>
                        <textarea id="description" placeholder="输入联系人电话、备注信息等"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-danger" id="cancelBtn">取消</button>
                <button class="btn-primary" id="saveBtn">保存</button>
            </div>
        </div>
    </div>

    <!-- 添加临时工作弹窗 -->
    <div class="modal-overlay" id="tempModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="tempModalTitle">添加当日临时工作</h2>
                <button class="close-btn" id="closeTempModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="tempForm">
                    <input type="hidden" id="tempDate">
                    <div class="form-group">
                        <label for="tempTitle">工作标题 *</label>
                        <input type="text" id="tempTitle" required placeholder="输入工作内容">
                    </div>
                    <div class="form-group">
                        <label for="tempNote">备注</label>
                        <textarea id="tempNote" placeholder="补充说明"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-danger" id="cancelTempBtn">取消</button>
                <button class="btn-primary" id="saveTempBtn">保存</button>
            </div>
        </div>
    </div>

    <!-- 修改日志弹窗 -->
    <div class="log-modal" id="logModal">
        <div class="log-container">
            <div class="log-header">
                <h2 id="logModalTitle">修改日志</h2>
                <button class="close-btn" id="closeLogModal">&times;</button>
            </div>
            <div class="log-body" id="logBody">
            </div>
        </div>
    </div>

    <script>
        const APP_VERSION = '1.2.0-beta6';
        const INSTALLATION_DEFICIT_STATUSES = ['未生产', '已生产', '已带现场'];
        const BASE_RELEASE_VERSION = '1.1.0';

        // 7个生产阶段定义
        const stages = [
            { id: 0, name: '报价', progress: Math.round(100/8*1) },
            { id: 1, name: '画图', progress: Math.round(100/8*2) },
            { id: 2, name: '对图', progress: Math.round(100/8*3) },
            { id: 3, name: '量尺', progress: Math.round(100/8*4) },
            { id: 4, name: '排产', progress: Math.round(100/8*5) },
            { id: 5, name: '组装', progress: Math.round(100/8*6) },
            { id: 6, name: '配送', progress: Math.round(100/8*7) },
            { id: 7, name: 'Delivered', progress: 100 }
        ];

        const kanbanStages = stages.filter(stage => stage.id !== 7);
        const ORDER_STATUSES = ['未定', '已定', '已付款'];
        const STAGE_EVENT_CLASS_BY_ID = {
            default: 'calendar-event-stage-default',
            expected: 'calendar-event-stage-expected',
            0: 'calendar-event-stage-0',
            1: 'calendar-event-stage-1',
            2: 'calendar-event-stage-2',
            3: 'calendar-event-stage-3',
            4: 'calendar-event-stage-4',
            5: 'calendar-event-stage-5',
            6: 'calendar-event-stage-6',
            7: 'calendar-event-stage-7'
        };

        let draggedProject = null;
        let currentCalendar = { year: null, month: null };
        let currentWeek = { year: null, week: null }; // ISO 周日
        let currentDay = { year: null, month: null, day: null };
        let calendarView = 'month'; // month | week | day
        let pendingTempDate = null;
        let pendingTempEditId = null;
        let deliveredSelectedMonth = 'all';

        // 更新项目指定阶段的日期（日历拖拽功能）
        function updateProjectStageDate(projectId, stageId, newDateStr) {
            const projects = getProjects();
            const project = projects.find(p => p.id === projectId);
            if (!project) return;
            
            if (!project.stageDates) {
                project.stageDates = {};
            }
            project.stageDates[stageId] = newDateStr;
            
            // 添加修改日志
            addProjectLog(projectId, `拖拽更新【${stages[stageId].name}】日期到 ${newDateStr}`);
            
            saveProjects(projects);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('versionInfo').textContent = `v${APP_VERSION} · base ${BASE_RELEASE_VERSION}`;

            // 设置今天日期（修复时区偏移）
            const today = new Date();
            // 修复时区偏移：获取本地日期正确的ISO字符串
            const todayStr = new Date(today.getTime() - today.getTimezoneOffset() * 60000).toISOString().split('T')[0];
            currentCalendar.year = today.getFullYear();
            currentCalendar.month = today.getMonth();
            currentWeek.year = today.getFullYear();
            currentWeek.week = getWeekNumber(today);
            currentDay.year = today.getFullYear();
            currentDay.month = today.getMonth();
            currentDay.day = today.getDate();

            // 生成阶段选择和日期输入
            const stageContainer = document.getElementById('stageDatesContainer');
            const stageSelect = document.getElementById('currentStage');
            stages.forEach((stage, index) => {
                // 日期输入框
                const div = document.createElement('div');
                div.className = 'stage-date-item';
                div.innerHTML = `
                    <label for="stageDate_${index}">${index+1}. ${stage.name}</label>
                    <input type="date" id="stageDate_${index}">
                `;
                stageContainer.appendChild(div);

                // 下拉选项
                const option = document.createElement('option');
                option.value = index;
                option.textContent = `${index+1}. ${stage.name}`;
                stageSelect.appendChild(option);
            });

            // 生成5个进度款输入框
            const paymentContainer = document.getElementById('progressPaymentsContainer');
            for (let i = 0; i < 5; i++) {
                const div = document.createElement('div');
                div.className = 'progress-payment-item';
                div.innerHTML = `
                    <div>
                        <label>进度 ${i+1}</label>
                    </div>
                    <div>
                        <label>百分比 %</label>
                        <input type="number" id="paymentPercent_${i}" min="0" max="100" step="0.1" placeholder="%">
                    </div>
                    <div>
                        <label>金额 $</label>
                        <input type="number" id="paymentAmount_${i}" min="0" step="0.01" placeholder="$">
                    </div>
                    <div>
                        <label>备注</label>
                        <input type="text" id="paymentNote_${i}" placeholder="付款备注">
                    </div>
                    <div class="paid-checkbox">
                        <input type="checkbox" id="paymentPaid_${i}">
                        <label>已付</label>
                    </div>
                `;
                paymentContainer.appendChild(div);

                // 绑定双向计算
                document.getElementById(`paymentPercent_${i}`).addEventListener('input', () => {
                    updatePaymentFromPercent(i);
                    updateTotalSummary();
                });
                document.getElementById(`paymentAmount_${i}`).addEventListener('input', () => {
                    updatePaymentFromAmount(i);
                    updateTotalSummary();
                });
                document.getElementById(`paymentPaid_${i}`).addEventListener('change', updateTotalSummary);
            }

            // 绑定事件
            document.getElementById('pageSelector').addEventListener('change', switchPage);
            document.getElementById('addProjectBtn').addEventListener('click', openAddModal);
            document.getElementById('closeModal').addEventListener('click', closeModal);
            document.getElementById('cancelBtn').addEventListener('click', closeModal);
            document.getElementById('saveBtn').addEventListener('click', saveProject);
            document.getElementById('closeLogModal').addEventListener('click', closeLogModal);
            document.getElementById('exportBtn').addEventListener('click', exportData);
            document.getElementById('importFile').addEventListener('change', importJsonData);
            document.getElementById('searchInput').addEventListener('input', renderCurrentPage);
            document.getElementById('flagFilter').addEventListener('change', renderCurrentPage);
            document.getElementById('orderItemStatusFilter').addEventListener('change', renderOrderPage);
            document.getElementById('addOrderRowBtn').addEventListener('click', () => addOrderRow());
            document.getElementById('addInstallationDeficitBtn').addEventListener('click', addGlobalInstallationDeficit);
            document.getElementById('addEditInstallationDeficitBtn').addEventListener('click', () => addInstallationDeficitRow());
            // Delivered 页面筛选排序事件
            ['deliveredDateStart', 'deliveredDateEnd', 'deliveredPaymentFilter', 'deliveredSortBy'].forEach(id => {
                document.getElementById(id).addEventListener('change', renderDeliveredPage);
            });
            document.getElementById('prevCalendar').addEventListener('click', prevCalendar);
            document.getElementById('nextCalendar').addEventListener('click', nextCalendar);
            document.getElementById('calendarView').addEventListener('change', (e) => {
                calendarView = e.target.value;
                // 切换视图时，从当前今天初始化，避免跳到很远的日期
                const today = new Date();
                if (calendarView === 'day') {
                    currentDay.year = today.getFullYear();
                    currentDay.month = today.getMonth();
                    currentDay.day = today.getDate();
                } else if (calendarView === 'week') {
                    currentWeek.year = today.getFullYear();
                    currentWeek.week = getWeekNumber(today);
                } else if (calendarView === 'month') {
                    currentCalendar.year = today.getFullYear();
                    currentCalendar.month = today.getMonth();
                }
                renderCalendar();
            });
            document.getElementById('closeTempModal').addEventListener('click', closeTempModal);
            document.getElementById('cancelTempBtn').addEventListener('click', closeTempModal);
            document.getElementById('saveTempBtn').addEventListener('click', saveTempWork);

            document.getElementById('modal').addEventListener('click', (e) => {
                // Disable click overlay to close - user must use close button
                // if (e.target.id === 'modal') closeModal();
            });
            document.getElementById('logModal').addEventListener('click', (e) => {
                // Disable click overlay to close - user must use close button
                // if (e.target.id === 'logModal') closeLogModal();
            });
            document.getElementById('tempModal').addEventListener('click', (e) => {
                // Disable click overlay to close - user must use close button
                // if (e.target.id === 'tempModal') closeTempModal();
            });

            // 设置默认创建日期
            document.getElementById('createDate').value = todayStr;

            // 监听总金额变化重新计算
            document.getElementById('totalAmount').addEventListener('input', () => {
                for (let i = 0; i < 5; i++) {
                    if (document.getElementById(`paymentPercent_${i}`).value) {
                        updatePaymentFromPercent(i);
                    }
                }
                updateTotalSummary();
            });

            switchPage();
            renderCurrentPage();
            renderCalendar();
        });

        function switchPage() {
            const selected = document.getElementById('pageSelector').value;
            document.querySelectorAll('.page-view').forEach(el => el.classList.remove('active'));
            if (selected === 'list') {
                document.getElementById('listPage').classList.add('active');
            } else if (selected === 'kanban') {
                document.getElementById('kanbanPage').classList.add('active');
                renderBoard();
            } else if (selected === 'calendar') {
                document.getElementById('calendarPage').classList.add('active');
                renderCalendar();
            } else if (selected === 'order') {
                document.getElementById('orderPage').classList.add('active');
                renderOrderPage();
            } else if (selected === 'delivered') {
                document.getElementById('deliveredPage').classList.add('active');
                renderDeliveredPage();
            } else if (selected === 'installationDeficit') {
                document.getElementById('installationDeficitPage').classList.add('active');
                renderInstallationDeficitPage();
            }
            updateStats();
        }

        function renderCurrentPage() {
            const selected = document.getElementById('pageSelector').value;
            if (selected === 'list') {
                renderList();
            } else if (selected === 'kanban') {
                renderBoard();
            } else if (selected === 'calendar') {
                renderCalendar();
            } else if (selected === 'order') {
                renderOrderPage();
            } else if (selected === 'delivered') {
                renderDeliveredPage();
            } else if (selected === 'installationDeficit') {
                renderInstallationDeficitPage();
            }
        }

        // === 数据存取 / 兼容迁移 / 智能导入 ===
        function deepClone(value) {
            return value == null ? value : JSON.parse(JSON.stringify(value));
        }

        function getCurrentTimestamp() {
            return new Date().toISOString();
        }

        // === 时间工具 ===
        function getCurrentTime() {
            const now = new Date();
            return now.toLocaleString('zh-CN');
        }

        function getDateStringTimestamp(dateStr) {
            if (!dateStr || !/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return null;
            return `${dateStr}T00:00:00.000Z`;
        }

        function parseComparableTime(value) {
            if (value === null || value === undefined || value === '') return null;
            if (typeof value === 'number' && Number.isFinite(value)) return value;
            if (typeof value === 'string') {
                const trimmed = value.trim();
                if (!trimmed) return null;
                if (/^\d+$/.test(trimmed)) return parseInt(trimmed, 10);
                const parsed = Date.parse(trimmed);
                if (!Number.isNaN(parsed)) return parsed;
            }
            return null;
        }

        function isFilledValue(value) {
            if (value === null || value === undefined) return false;
            if (typeof value === 'string') return value.trim() !== '';
            return true;
        }

        function valuesEqual(a, b) {
            return JSON.stringify(a ?? null) === JSON.stringify(b ?? null);
        }

        function getStageProgress(stageId) {
            const stage = stages.find(s => s.id === Number(stageId));
            return stage ? stage.progress : stages[0].progress;
        }

        function getStageById(stageId) {
            const normalized = Number(stageId);
            if (!Number.isFinite(normalized)) return null;
            return stages.find(s => s.id === normalized) || null;
        }

        function getStageEventClass(stageId) {
            if (stageId === 'expected') {
                return STAGE_EVENT_CLASS_BY_ID.expected;
            }
            const normalized = Number(stageId);
            if (!Number.isFinite(normalized)) {
                return STAGE_EVENT_CLASS_BY_ID.default;
            }
            return STAGE_EVENT_CLASS_BY_ID[normalized] || STAGE_EVENT_CLASS_BY_ID.default;
        }

        function normalizeProjectFlag(value) {
            const normalized = typeof value === 'string' ? value.trim().toLowerCase() : '';
            if (normalized === 'follow_up' || normalized === 'followup' || normalized === '跟进') return 'follow_up';
            if (normalized === 'on_hold' || normalized === 'on hold' || normalized === 'hold') return 'on_hold';
            return '';
        }

        function getProjectFlagLabel(flag) {
            const normalized = normalizeProjectFlag(flag);
            if (normalized === 'follow_up') return '跟进';
            if (normalized === 'on_hold') return 'On Hold';
            return '正常';
        }

        function getProjectFlagClass(flag) {
            const normalized = normalizeProjectFlag(flag);
            return normalized ? `flag-${normalized}` : 'flag-normal';
        }

        function renderProjectFlagBadge(flag) {
            const normalized = normalizeProjectFlag(flag);
            if (!normalized) return '';
            return `<span class="project-flag-badge ${getProjectFlagClass(normalized)}">${escapeHtml(getProjectFlagLabel(normalized))}</span>`;
        }

        function projectMatchesFilters(project, searchText, flagFilter) {
            const normalizedFlag = normalizeProjectFlag(project?.projectFlag);
            const selectedFlag = normalizeProjectFlag(flagFilter === 'normal' ? '' : flagFilter);
            const matchesFlag = flagFilter === 'all'
                ? true
                : flagFilter === 'normal'
                    ? normalizedFlag === ''
                    : normalizedFlag === selectedFlag;
            if (!matchesFlag) return false;

            if (!searchText) return true;
            const haystacks = [
                project?.name || '',
                project?.description || '',
                getProjectFlagLabel(normalizedFlag),
                normalizedFlag.replace('_', ' '),
                (stages[project?.currentStage] && stages[project.currentStage].name) || ''
            ].map(value => String(value).toLowerCase());
            return haystacks.some(value => value.includes(searchText));
        }

        function calculateDaysLeft(dateStr) {
            if (!dateStr) return null;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const target = new Date(dateStr);
            target.setHours(0, 0, 0, 0);
            return Math.ceil((target - today) / (1000 * 60 * 60 * 24));
        }

        function generateLegacyProjectId(project, fallbackIndex = 0) {
            const base = [project?.name || '', project?.createDate || '', project?.expectedDate || '', fallbackIndex].join('|');
            let hash = 0;
            for (let i = 0; i < base.length; i++) {
                hash = ((hash << 5) - hash) + base.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash) + 1000000000;
        }

        function normalizePaymentItem(payment) {
            if (!payment || typeof payment !== 'object') return null;
            const percent = isFilledValue(payment.percent) ? parseFloat(payment.percent) : null;
            const amount = isFilledValue(payment.amount) ? parseFloat(payment.amount) : null;
            const note = typeof payment.note === 'string' ? payment.note : '';
            const paid = !!payment.paid;
            if (percent === null && amount === null && !note && !paid) return null;
            return {
                percent: Number.isFinite(percent) ? percent : null,
                amount: Number.isFinite(amount) ? amount : null,
                note,
                paid
            };
        }

        function hasPrimaryPaymentValue(payment) {
            return !!(payment && (isFilledValue(payment.percent) || isFilledValue(payment.amount)));
        }

        function normalizeLogEntry(log) {
            if (!log || typeof log !== 'object') return null;
            const time = typeof log.time === 'string' ? log.time : '';
            const action = typeof log.action === 'string' ? log.action : '';
            const detail = typeof log.detail === 'string' ? log.detail : '';
            if (!time && !action && !detail) return null;
            return { time, action, detail };
        }

        function createLogEntry(action, detail) {
            return {
                time: getCurrentTime(),
                action,
                detail
            };
        }

        function mergeLogs(currentLogs = [], importedLogs = []) {
            const merged = [];
            const seen = new Set();
            [...(Array.isArray(currentLogs) ? currentLogs : []), ...(Array.isArray(importedLogs) ? importedLogs : [])]
                .map(normalizeLogEntry)
                .filter(Boolean)
                .forEach(log => {
                    const key = JSON.stringify([log.time || '', log.action || '', log.detail || '']);
                    if (!seen.has(key)) {
                        seen.add(key);
                        merged.push(log);
                    }
                });
            return merged;
        }

        function normalizeOrderItems(items) {
            if (!Array.isArray(items)) return [];
            return items.map(item => {
                const name = typeof item?.name === 'string' ? item.name.trim() : '';
                const rawQuantity = item?.quantity;
                let quantity = '';
                if (typeof rawQuantity === 'number') {
                    quantity = String(rawQuantity);
                } else if (typeof rawQuantity === 'string') {
                    quantity = rawQuantity.trim();
                }
                let status = normalizeOrderStatus(item?.status);
                return { name, quantity, status };
            }).filter(item => item.name || item.quantity);
        }

        function normalizeOrderStatus(status) {
            if (typeof status !== 'string') return '未定';
            return ORDER_STATUSES.includes(status) ? status : '未定';
        }

        // 渲染配送方式标签
        function renderDeliveryTypeBadge(deliveryType) {
            if (!deliveryType) return '';
            let cssClass = '';
            if (deliveryType === '自取') cssClass = 'delivery-self';
            else if (deliveryType === '送货') cssClass = 'delivery-delivery';
            else if (deliveryType === '安装') cssClass = 'delivery-install';
            return `<span class="delivery-type-badge ${cssClass}">${escapeHtml(deliveryType)}</span>`;
        }

        function projectHasOrderData(project) {
            if (!project) return false;
            const items = Array.isArray(project.orderItems) ? project.orderItems : [];
            return items.some(item => {
                const name = typeof item?.name === 'string' ? item.name.trim() : '';
                let quantity = '';
                if (typeof item?.quantity === 'number') {
                    quantity = String(item.quantity).trim();
                } else if (typeof item?.quantity === 'string') {
                    quantity = item.quantity.trim();
                }
                return !!(name || quantity);
            });
        }

        function extractDatePart(value) {
            if (typeof value !== 'string') return '';
            const trimmed = value.trim();
            if (!trimmed) return '';
            const idx = trimmed.indexOf('T');
            if (idx === -1) return trimmed;
            return trimmed.slice(0, idx);
        }

        function resolveDeliveredMonthSource(project) {
            if (!project) return '';
            const stageDate = project.stageDates ? project.stageDates[6] : '';
            if (stageDate) return stageDate;
            if (project.expectedDate) return extractDatePart(project.expectedDate);
            return '';
        }

        function resolveDeliveredDate(project) {
            if (!project) return '';
            const primary = resolveDeliveredMonthSource(project);
            if (primary) return primary;
            if (project.updatedAt) return extractDatePart(project.updatedAt);
            return '';
        }

        function getYearMonthKey(value) {
            const datePart = extractDatePart(value);
            if (!datePart) return null;
            const [year, month] = datePart.split('-');
            if (!year || !month) return null;
            return `${year}-${month.padStart(2, '0')}`;
        }

        function formatYearMonthLabel(yearMonthKey) {
            if (!yearMonthKey) return '';
            const matches = /^(\d{4})-(\d{2})$/.exec(yearMonthKey);
            if (!matches) {
                return yearMonthKey;
            }
            const numericMonth = Number.parseInt(matches[2], 10);
            return `${matches[1]}年${numericMonth}月`;
        }

        function formatMoney(value) {
            const numeric = Number.parseFloat(value);
            if (!Number.isFinite(numeric)) return '$0.00';
            return `$${numeric.toFixed(2)}`;
        }

        function normalizeProject(project, fallbackIndex = 0) {
            const source = deepClone(project || {});
            const rawId = source.id;
            let id = rawId;
            if (!isFilledValue(id)) {
                id = generateLegacyProjectId(source, fallbackIndex);
            } else if (typeof id === 'string') {
                const numericId = Number(id);
                id = Number.isFinite(numericId) ? numericId : generateLegacyProjectId(source, fallbackIndex);
            } else if (typeof id !== 'number' || !Number.isFinite(id)) {
                id = generateLegacyProjectId(source, fallbackIndex);
            }

            let currentStage = parseInt(source.currentStage, 10);
            if (Number.isNaN(currentStage)) currentStage = 0;
            currentStage = Math.max(0, Math.min(stages.length - 1, currentStage));

            const stageDates = {};
            stages.forEach((stage, index) => {
                const rawValue = source.stageDates && typeof source.stageDates === 'object'
                    ? (source.stageDates[index] ?? source.stageDates[String(index)] ?? '')
                    : '';
                stageDates[index] = typeof rawValue === 'string' ? rawValue : '';
            });

            const progressPayments = Array.isArray(source.progressPayments)
                ? source.progressPayments.map(normalizePaymentItem)
                : [];

            const orderItems = normalizeOrderItems(source.orderItems);
            const orderStatus = normalizeOrderStatus(source.orderStatus);

            const installationDeficits = Array.isArray(source.installationDeficits)
                ? source.installationDeficits.map(item => ({
                    id: item.id || Date.now() + Math.random(),
                    projectId: item.projectId || null,
                    projectName: typeof item.projectName === 'string' ? item.projectName : '',
                    content: typeof item.content === 'string' ? item.content : '',
                    status: INSTALLATION_DEFICIT_STATUSES.includes(item.status) ? item.status : '未生产'
                }))
                : [];

            // 配送方式：空 / 自取 / 送货 / 安装
            let deliveryType = '';
            if (source.deliveryType === '自取' || source.deliveryType === '送货' || source.deliveryType === '安装') {
                deliveryType = source.deliveryType;
            }

            const logs = Array.isArray(source.logs)
                ? source.logs.map(normalizeLogEntry).filter(Boolean)
                : [];

            const totalAmount = isFilledValue(source.totalAmount) ? parseFloat(source.totalAmount) : null;
            const version = Number.isFinite(Number(source.version)) ? Math.max(1, parseInt(source.version, 10)) : 1;
            const updatedAt = source.updatedAt || source.modifiedAt || source.lastUpdatedAt || getDateStringTimestamp(source.createDate) || null;

            return {
                ...source,
                id,
                name: typeof source.name === 'string' ? source.name.trim() : '',
                createDate: typeof source.createDate === 'string' ? source.createDate : '',
                expectedDate: typeof source.expectedDate === 'string' ? source.expectedDate : '',
                description: typeof source.description === 'string' ? source.description.trim() : '',
                projectFlag: normalizeProjectFlag(source.projectFlag),
                deliveryType,
                currentStage,
                progress: getStageProgress(currentStage),
                totalAmount: Number.isFinite(totalAmount) ? totalAmount : null,
                stageDates,
                progressPayments,
                orderItems,
                installationDeficits,
                logs,
                version,
                updatedAt
            };
        }

        function normalizeTempWork(tempWork, fallbackIndex = 0) {
            const source = deepClone(tempWork || {});
            let id = source.id;
            if (!isFilledValue(id)) {
                id = generateLegacyProjectId({
                    name: source.title || '',
                    createDate: source.date || '',
                    expectedDate: String(fallbackIndex)
                }, fallbackIndex);
            }
            return {
                ...source,
                id,
                date: typeof source.date === 'string' ? source.date : '',
                title: typeof source.title === 'string' ? source.title.trim() : '',
                note: typeof source.note === 'string' ? source.note.trim() : '',
                createdAt: source.createdAt || getCurrentTime(),
                updatedAt: source.updatedAt || source.createdAt || getDateStringTimestamp(source.date) || null
            };
        }

        function getProjects() {
            try {
                const stored = localStorage.getItem('projects');
                if (!stored) return [];
                const parsed = JSON.parse(stored);
                if (!Array.isArray(parsed)) return [];
                return parsed.map((project, index) => normalizeProject(project, index));
            } catch (err) {
                console.error('Failed to parse projects from localStorage:', err);
                return [];
            }
        }

        function getTempWorks() {
            try {
                const stored = localStorage.getItem('tempWorks');
                if (!stored) return [];
                const parsed = JSON.parse(stored);
                if (!Array.isArray(parsed)) return [];
                return parsed.map((item, index) => normalizeTempWork(item, index));
            } catch (err) {
                console.error('Failed to parse tempWorks from localStorage:', err);
                return [];
            }
        }

        function saveProjects(projects) {
            localStorage.setItem('projects', JSON.stringify((projects || []).map((project, index) => normalizeProject(project, index))));
        }

        function saveTempWorks(tempWorks) {
            localStorage.setItem('tempWorks', JSON.stringify((tempWorks || []).map((item, index) => normalizeTempWork(item, index))));
        }

        function compareProjectFreshness(currentProject, importedProject) {
            const currentVersion = Number(currentProject?.version);
            const importedVersion = Number(importedProject?.version);
            if (Number.isFinite(currentVersion) && Number.isFinite(importedVersion) && currentVersion !== importedVersion) {
                return importedVersion > currentVersion ? 1 : -1;
            }

            const currentTime = parseComparableTime(currentProject?.updatedAt);
            const importedTime = parseComparableTime(importedProject?.updatedAt);
            if (currentTime !== null && importedTime !== null && currentTime !== importedTime) {
                return importedTime > currentTime ? 1 : -1;
            }
            if (currentTime === null && importedTime !== null) return 1;
            if (currentTime !== null && importedTime === null) return -1;
            return 0;
        }

        function pushConflict(conflicts, project, field, currentValue, importedValue, type = 'field', extra = {}) {
            conflicts.push({
                projectId: project.id,
                projectName: project.name || `项目 ${project.id}`,
                field,
                currentValue: deepClone(currentValue),
                importedValue: deepClone(importedValue),
                type,
                ...extra
            });
        }

        function resolveSimpleField(currentValue, importedValue, freshness, conflicts, project, field) {
            if (valuesEqual(currentValue, importedValue)) return deepClone(currentValue);
            const currentFilled = isFilledValue(currentValue);
            const importedFilled = isFilledValue(importedValue);
            if (!currentFilled && importedFilled) return deepClone(importedValue);
            if (currentFilled && !importedFilled) return deepClone(currentValue);
            if (freshness > 0) return deepClone(importedValue);
            if (freshness < 0) return deepClone(currentValue);
            pushConflict(conflicts, project, field, currentValue, importedValue, 'field');
            return deepClone(currentValue);
        }

        function mergeProject(oldProject, importedProject) {
            const current = normalizeProject(oldProject);
            const imported = normalizeProject(importedProject);
            const freshness = compareProjectFreshness(current, imported);
            const conflicts = [];
            const merged = deepClone(current);

            ['name', 'createDate', 'expectedDate', 'description', 'totalAmount', 'currentStage', 'projectFlag'].forEach(field => {
                merged[field] = resolveSimpleField(current[field], imported[field], freshness, conflicts, current, field);
            });
            merged.progress = getStageProgress(merged.currentStage);

            merged.stageDates = {};
            stages.forEach((stage, index) => {
                const currentValue = current.stageDates?.[index] || '';
                const importedValue = imported.stageDates?.[index] || '';
                if (!isFilledValue(importedValue)) {
                    merged.stageDates[index] = currentValue;
                    return;
                }
                if (!isFilledValue(currentValue) || currentValue === importedValue || freshness !== 0) {
                    merged.stageDates[index] = importedValue;
                    return;
                }
                pushConflict(conflicts, current, `stageDates.${index}`, currentValue, importedValue, 'stageDate', { stageIndex: index });
                merged.stageDates[index] = currentValue;
            });

            const maxPaymentLength = Math.max(current.progressPayments.length, imported.progressPayments.length, 5);
            merged.progressPayments = [];
            for (let index = 0; index < maxPaymentLength; index++) {
                const currentPayment = normalizePaymentItem(current.progressPayments[index]);
                const importedPayment = normalizePaymentItem(imported.progressPayments[index]);
                const currentHasValue = hasPrimaryPaymentValue(currentPayment);
                const importedHasValue = hasPrimaryPaymentValue(importedPayment);

                if (!importedHasValue) {
                    merged.progressPayments[index] = currentPayment ? deepClone(currentPayment) : null;
                    continue;
                }

                if (currentHasValue && !valuesEqual(currentPayment, importedPayment) && freshness === 0) {
                    pushConflict(conflicts, current, `progressPayments[${index}]`, currentPayment, importedPayment, 'progressPayment', { paymentIndex: index });
                    merged.progressPayments[index] = currentPayment ? deepClone(currentPayment) : null;
                    continue;
                }

                merged.progressPayments[index] = normalizePaymentItem({
                    percent: isFilledValue(importedPayment?.percent) ? importedPayment.percent : currentPayment?.percent,
                    amount: isFilledValue(importedPayment?.amount) ? importedPayment.amount : currentPayment?.amount,
                    note: isFilledValue(importedPayment?.note) ? importedPayment.note : (currentPayment?.note || ''),
                    paid: importedPayment ? importedPayment.paid : !!currentPayment?.paid
                });
            }

            merged.logs = mergeLogs(current.logs, imported.logs);
            merged.id = current.id;
            merged.version = Math.max(Number(current.version) || 1, Number(imported.version) || 1) + 1;
            merged.updatedAt = getCurrentTimestamp();
            return {
                project: normalizeProject(merged),
                conflicts,
                freshness
            };
        }

        function applyConflictChoice(project, conflict, useImported) {
            const nextValue = deepClone(useImported ? conflict.importedValue : conflict.currentValue);
            switch (conflict.type) {
                case 'stageDate':
                    if (!project.stageDates) project.stageDates = {};
                    project.stageDates[conflict.stageIndex] = nextValue || '';
                    break;
                case 'progressPayment':
                    if (!Array.isArray(project.progressPayments)) project.progressPayments = [];
                    project.progressPayments[conflict.paymentIndex] = nextValue;
                    break;
                default:
                    project[conflict.field] = nextValue;
                    if (conflict.field === 'currentStage') {
                        project.progress = getStageProgress(project.currentStage);
                    }
                    break;
            }
        }

        function formatConflictValue(value) {
            if (!isFilledValue(value) && value !== 0 && value !== false) return '(空)';
            if (typeof value === 'object') return JSON.stringify(value, null, 2);
            return String(value);
        }

        function getConflictLabel(conflict) {
            if (conflict.type === 'stageDate') {
                const stage = stages.find(s => s.id === conflict.stageIndex);
                return `阶段日期 - ${stage ? stage.name : conflict.stageIndex}`;
            }
            if (conflict.type === 'progressPayment') {
                return `进度款 #${conflict.paymentIndex + 1}`;
            }
            const labels = {
                name: '项目名称',
                createDate: '创建日期',
                expectedDate: '预计完成日期',
                description: '备注',
                totalAmount: '总金额',
                currentStage: '当前阶段',
                projectFlag: '项目状态标签'
            };
            return labels[conflict.field] || conflict.field;
        }

        function resolveImportConflicts(projects, conflicts) {
            const mergedProjects = projects.map((project, index) => normalizeProject(project, index));
            let keepImportedCount = 0;
            let keepCurrentCount = 0;

            conflicts.forEach((conflict, index) => {
                const project = mergedProjects.find(item => String(item.id) === String(conflict.projectId));
                if (!project) return;
                const useImported = confirm(
                    `检测到导入冲突（${index + 1}/${conflicts.length}）\n\n` +
                    `项目：${conflict.projectName}\n` +
                    `字段：${getConflictLabel(conflict)}\n\n` +
                    `当前值：\n${formatConflictValue(conflict.currentValue)}\n\n` +
                    `导入值：\n${formatConflictValue(conflict.importedValue)}\n\n` +
                    `点击“确定”保留导入值\n点击“取消”保留当前值`
                );
                applyConflictChoice(project, conflict, useImported);
                if (useImported) keepImportedCount += 1;
                else keepCurrentCount += 1;
            });

            return {
                projects: mergedProjects.map((project, index) => normalizeProject(project, index)),
                keepImportedCount,
                keepCurrentCount
            };
        }

        function smartMergeProjects(currentProjects, importedProjects) {
            const mergedProjects = (currentProjects || []).map((project, index) => normalizeProject(project, index));
            const conflicts = [];
            const stats = {
                added: 0,
                merged: 0,
                importedNewer: 0,
                currentNewer: 0,
                undetermined: 0
            };

            (importedProjects || []).forEach((project, index) => {
                const imported = normalizeProject(project, index);
                const existingIndex = mergedProjects.findIndex(item => String(item.id) === String(imported.id));
                if (existingIndex === -1) {
                    const newProject = normalizeProject({
                        ...imported,
                        updatedAt: imported.updatedAt || getCurrentTimestamp(),
                        version: Math.max(Number(imported.version) || 1, 1)
                    }, index);
                    mergedProjects.unshift(newProject);
                    stats.added += 1;
                    return;
                }

                const result = mergeProject(mergedProjects[existingIndex], imported);
                mergedProjects[existingIndex] = result.project;
                conflicts.push(...result.conflicts);
                stats.merged += 1;
                if (result.freshness > 0) stats.importedNewer += 1;
                else if (result.freshness < 0) stats.currentNewer += 1;
                else stats.undetermined += 1;
            });

            return {
                projects: mergedProjects.map((project, index) => normalizeProject(project, index)),
                conflicts,
                stats
            };
        }

        function compareTempWorkFreshness(currentWork, importedWork) {
            const currentTime = parseComparableTime(currentWork?.updatedAt || currentWork?.createdAt);
            const importedTime = parseComparableTime(importedWork?.updatedAt || importedWork?.createdAt);
            if (currentTime !== null && importedTime !== null && currentTime !== importedTime) {
                return importedTime > currentTime ? 1 : -1;
            }
            if (currentTime === null && importedTime !== null) return 1;
            if (currentTime !== null && importedTime === null) return -1;
            return 0;
        }

        function mergeTempWorks(currentTempWorks, importedTempWorks) {
