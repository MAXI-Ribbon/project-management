<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生产项目管理</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: #f0f2f5;
            padding: 15px;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 15px;
            font-size: 24px;
        }

        .toolbar {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .toolbar input, .toolbar select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .toolbar input[type="text"] {
            flex: 1;
            min-width: 200px;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-primary {
            background-color: #1677ff;
            color: white;
        }

        .btn-primary:hover {
            background-color: #4096ff;
        }

        .btn-danger {
            background-color: #ff4d4f;
            color: white;
        }

        .btn-danger:hover {
            background-color: #ff7875;
        }

        .btn-success {
            background-color: #52c41a;
            color: white;
        }

        .btn-success:hover {
            background-color: #73d13d;
        }

        /* === 页面容器 === */
        .page-view {
            display: none;
        }
        .page-view.active {
            display: block;
        }

        /* === 项目列表视图 === */
        .list-container {
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .list-item {
            border-bottom: 1px solid #f0f0f0;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .list-info {
            flex: 1;
        }

        .list-name {
            font-weight: 600;
            font-size: 15px;
            color: #333;
        }

        .list-meta {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }

        .list-actions {
            display: flex;
            gap: 5px;
        }

        .list-actions button {
            padding: 4px 8px;
            font-size: 12px;
        }

        /* === 看板视图 === */
        .kanban-board {
            display: grid;
            grid-template-columns: repeat(7, minmax(220px, 1fr));
            gap: 12px;
        }

        .kanban-column {
            background: white;
            border-radius: 8px;
            padding: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            min-height: 500px;
        }

        .column-header {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .count-badge {
            background: #eee;
            padding: 2px 6px;
            border-radius: 8px;
            font-size: 11px;
            color: #666;
        }

        .kanban-card {
            border: 1px solid #e8e8e8;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 8px;
            background: #fafafa;
            cursor: grab;
            transition: transform 0.2s;
        }

        .kanban-card:hover {
            transform: translateY(-1px);
        }

        .kanban-card.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        .card-title {
            font-weight: 600;
            font-size: 13px;
            color: #333;
            margin-bottom: 6px;
            word-break: break-word;
        }

        .card-info {
            font-size: 11px;
            color: #666;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }

        .card-stage-date {
            color: #1677ff;
            font-weight: 500;
        }

        .progress-bar {
            width: 100%;
            height: 5px;
            background-color: #f0f0f0;
            border-radius: 3px;
            overflow: hidden;
            margin: 6px 0;
        }

        .progress-fill {
            height: 100%;
            background-color: #52c41a;
        }

        .overdue {
            background: #fff1f0;
            border-color: #ffa39e;
        }

        .danger-badge {
            background: #ffccc7;
            color: #cf1322;
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 600;
        }

        .card-actions {
            margin-top: 8px;
            display: flex;
            gap: 4px;
            justify-content: flex-end;
        }

        .card-actions button {
            padding: 3px 6px;
            font-size: 11px;
        }

        .empty-column {
            text-align: center;
            color: #999;
            padding: 20px;
            font-size: 12px;
        }

        /* === 日历视图 === */
        .calendar-container {
            background: white;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .calendar-month {
            font-size: 18px;
            font-weight: 600;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .calendar-weekday {
            text-align: center;
            font-weight: 600;
            padding: 8px;
            color: #666;
            background: #f5f5f5;
            border-radius: 4px;
            font-size: 13px;
        }

        .calendar-day {
            min-height: 100px;
            border: 1px solid #e8e8e8;
            border-radius: 6px;
            padding: 6px;
            background: white;
            position: relative;
        }

        .calendar-day.today {
            background: #e6f7ff;
            border-color: #1890ff;
        }

        .calendar-day.other-month {
            background: #fafafa;
            color: #ccc;
        }

        .day-number {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .add-temp-btn {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #52c41a;
            color: white;
            border: none;
            font-size: 14px;
            line-height: 18px;
            padding: 0;
            cursor: pointer;
        }

        .calendar-event {
            font-size: 11px;
            padding: 2px 4px;
            margin-bottom: 3px;
            border-radius: 3px;
            background: #f0f0f0;
            cursor: pointer;
        }

        .calendar-event.project {
            background: #e6f7ff;
            color: #1890ff;
        }

        .calendar-event.temp {
            background: #f6ffed;
            color: #52c41a;
        }

        /* === 弹窗 === */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 8px;
            width: 90%;
            max-width: 550px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 18px;
            margin: 0;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
            padding: 0;
            width: 30px;
            height: 30px;
            line-height: 30px;
        }

        .modal-body {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }

        /* 每个阶段日期 */
        .stage-dates {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .stage-date-item {
            display: flex;
            flex-direction: column;
        }

        .stage-date-item label {
            font-size: 12px;
        }

        .modal-footer {
            padding: 15px 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* 统计信息 */
        .stats {
            display: flex;
            gap: 20px;
            margin-left: auto;
            font-size: 13px;
            color: #666;
        }

        /* 日志弹窗 */
        .log-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1001;
            justify-content: center;
            align-items: center;
        }

        .log-modal.show {
            display: flex;
        }

        .log-container {
            background: white;
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            max-height: 70vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .log-header {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .log-header h2 {
            font-size: 18px;
            margin: 0;
        }

        .log-body {
            padding: 15px;
            overflow-y: auto;
            flex: 1;
        }

        .log-item {
            padding: 10px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
        }

        .log-time {
            color: #999;
            font-size: 12px;
        }

        .log-action {
            font-weight: 600;
            color: #1677ff;
            margin-left: 10px;
        }

        .log-detail {
            margin-top: 5px;
            color: #666;
        }

        .empty-log {
            text-align: center;
            color: #999;
            padding: 30px;
        }

        /* 临时工作 */
        .temp-item {
            background: #fafafa;
            border: 1px solid #e8e8e8;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 8px;
        }

        .temp-item-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .temp-item-meta {
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
        }

        .temp-item-actions {
            text-align: right;
        }

        .temp-item-actions button {
            padding: 3px 8px;
            font-size: 12px;
        }

        /* === 进度款样式 === */
        .progress-payment-item {
            display: grid;
            grid-template-columns: 80px 100px 100px 1fr auto;
            gap: 8px;
            align-items: end;
            padding: 10px;
            border: 1px solid #eee;
            border-radius: 4px;
            margin-bottom: 8px;
            background: #fafafa;
        }

        .progress-payment-item label {
            font-size: 12px;
            margin: 0;
        }

        .progress-payment-item input {
            padding: 6px 8px;
            font-size: 13px;
        }

        .progress-payment-item .paid-checkbox {
            display: flex;
            align-items: center;
            gap: 4px;
            padding-bottom: 6px;
        }

        .progress-payment-item .paid-checkbox input {
            width: auto;
            margin: 0;
        }

        @media (max-width: 600px) {
            .progress-payment-item {
                grid-template-columns: 1fr 1fr;
            }
        }

        .payment-summary {
            margin-top: 8px;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 4px;
            font-size: 13px;
        }

        @media (max-width: 1600px) {
            .kanban-board {
                grid-template-columns: repeat(4, minmax(200px, 1fr));
            }
        }

        @media (max-width: 1024px) {
            .kanban-board {
                grid-template-columns: 1fr;
            }
            .calendar-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .stats {
                width: 100%;
                order: 3;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 生产项目管理</h1>

        <!-- 工具栏 -->
        <div class="toolbar">
            <select id="pageSelector">
                <option value="list">项目列表</option>
                <option value="kanban">看板视图</option>
                <option value="calendar">日历视图</option>
            </select>
            <input type="text" id="searchInput" placeholder="🔍 搜索项目...">
            <button class="btn-primary" id="addProjectBtn">+ 添加项目</button>
            <button class="btn-success" id="exportBtn">导出数据</button>
            <label for="importFile" class="btn-success" style="display: inline-block; cursor: pointer; line-height: normal; height: 34px; box-sizing: border-box;">导入备份</label>
            <input type="file" id="importFile" accept=".json" style="display: none;">
            <button class="btn-danger" id="clearBtn">清空</button>
            <div class="stats" id="stats"></div>
        </div>

        <!-- 项目列表页面 -->
        <div id="listPage" class="page-view active">
            <div class="list-container" id="listContainer">
                <div style="text-align: center; color: #999; padding: 40px;">暂无项目</div>
            </div>
        </div>

        <!-- 看板页面 -->
        <div id="kanbanPage" class="page-view">
            <div class="kanban-board" id="kanbanBoard"></div>
        </div>

        <!-- 日历页面 -->
        <div id="calendarPage" class="page-view">
            <div class="calendar-container">
                <div class="calendar-header">
                    <button class="btn-primary" id="prevMonth">&lt; 上个月</button>
                    <div class="calendar-month" id="calendarMonth"></div>
                    <button class="btn-primary" id="nextMonth">下个月 &gt;</button>
                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>
        </div>
    </div>

    <!-- 添加/编辑项目弹窗 -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">添加新项目</h2>
                <button class="close-btn" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="projectForm">
                    <input type="hidden" id="editId">
                    <div class="form-group">
                        <label for="projectName">项目名称/地址 *</label>
                        <input type="text" id="projectName" required placeholder="请输入项目名称或地址">
                    </div>

                    <div class="form-group">
                        <label for="createDate">创建日期</label>
                        <input type="date" id="createDate">
                    </div>

                    <div class="form-group">
                        <label for="expectedDate">预期完成日期</label>
                        <input type="date" id="expectedDate">
                    </div>

                    <div class="form-group">
                        <label>各阶段计划日期</label>
                        <div class="stage-dates" id="stageDatesContainer">
                            <!-- 动态生成 -->
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="currentStage">当前所处阶段</label>
                        <select id="currentStage"></select>
                    </div>

                    <div class="form-group">
                        <label for="totalAmount">项目总金额 ($)</label>
                        <input type="number" id="totalAmount" step="0.01" placeholder="输入项目总金额">
                    </div>

                    <div class="form-group">
                        <label>进度款（最多5笔）</label>
                        <div id="progressPaymentsContainer">
                            <!-- 5个进度款输入框 -->
                        </div>
                        <div style="margin-top: 10px; padding: 10px; background: #f5f5f5; border-radius: 4px;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                                <span>已付总额：</span>
                                <strong id="paidTotal">$0.00</strong>
                            </div>
                            <div style="display: flex; justify-content: space-between;">
                                <span>未付总额：</span>
                                <strong id="unpaidTotal" style="color: #cf1322;">$0.00</strong>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="description">备注 / 联系人信息</label>
                        <textarea id="description" placeholder="输入联系人电话、备注信息等"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-danger" id="cancelBtn">取消</button>
                <button class="btn-primary" id="saveBtn">保存</button>
            </div>
        </div>
    </div>

    <!-- 添加临时工作弹窗 -->
    <div class="modal-overlay" id="tempModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="tempModalTitle">添加当日临时工作</h2>
                <button class="close-btn" id="closeTempModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="tempForm">
                    <input type="hidden" id="tempDate">
                    <div class="form-group">
                        <label for="tempTitle">工作标题 *</label>
                        <input type="text" id="tempTitle" required placeholder="输入工作内容">
                    </div>
                    <div class="form-group">
                        <label for="tempNote">备注</label>
                        <textarea id="tempNote" placeholder="补充说明"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-danger" id="cancelTempBtn">取消</button>
                <button class="btn-primary" id="saveTempBtn">保存</button>
            </div>
        </div>
    </div>

    <!-- 修改日志弹窗 -->
    <div class="log-modal" id="logModal">
        <div class="log-container">
            <div class="log-header">
                <h2 id="logModalTitle">修改日志</h2>
                <button class="close-btn" id="closeLogModal">&times;</button>
            </div>
            <div class="log-body" id="logBody">
            </div>
        </div>
    </div>

    <script>
        // 7个生产阶段定义
        const stages = [
            { id: 0, name: '报价', progress: Math.round(100/7*1) },
            { id: 1, name: '画图', progress: Math.round(100/7*2) },
            { id: 2, name: '对图', progress: Math.round(100/7*3) },
            { id: 3, name: '量尺', progress: Math.round(100/7*4) },
            { id: 4, name: '排产', progress: Math.round(100/7*5) },
            { id: 5, name: '组装', progress: Math.round(100/7*6) },
            { id: 6, name: 'Delivered', progress: 100 }
        ];

        let draggedProject = null;
        let currentLogProjectId = null;
        let currentCalendar = { year: null, month: null };
        let pendingTempDate = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 设置今天日期
            const today = new Date();
            const todayStr = today.toISOString().split('T')[0];
            currentCalendar.year = today.getFullYear();
            currentCalendar.month = today.getMonth();

            // 生成阶段选择和日期输入
            const stageContainer = document.getElementById('stageDatesContainer');
            const stageSelect = document.getElementById('currentStage');
            stages.forEach((stage, index) => {
                // 日期输入框
                const div = document.createElement('div');
                div.className = 'stage-date-item';
                div.innerHTML = `
                    <label for="stageDate_${index}">${index+1}. ${stage.name}</label>
                    <input type="date" id="stageDate_${index}">
                `;
                stageContainer.appendChild(div);

                // 下拉选项
                const option = document.createElement('option');
                option.value = index;
                option.textContent = `${index+1}. ${stage.name}`;
                stageSelect.appendChild(option);
            });

            // 生成5个进度款输入框
            const paymentContainer = document.getElementById('progressPaymentsContainer');
            for (let i = 0; i < 5; i++) {
                const div = document.createElement('div');
                div.className = 'progress-payment-item';
                div.innerHTML = `
                    <div>
                        <label>进度 ${i+1}</label>
                    </div>
                    <div>
                        <label>百分比 %</label>
                        <input type="number" id="paymentPercent_${i}" min="0" max="100" step="0.1" placeholder="%">
                    </div>
                    <div>
                        <label>金额 $</label>
                        <input type="number" id="paymentAmount_${i}" min="0" step="0.01" placeholder="$">
                    </div>
                    <div>
                        <label>备注</label>
                        <input type="text" id="paymentNote_${i}" placeholder="付款备注">
                    </div>
                    <div class="paid-checkbox">
                        <input type="checkbox" id="paymentPaid_${i}">
                        <label>已付</label>
                    </div>
                `;
                paymentContainer.appendChild(div);

                // 绑定双向计算
                document.getElementById(`paymentPercent_${i}`).addEventListener('input', () => {
                    updatePaymentFromPercent(i);
                    updateTotalSummary();
                });
                document.getElementById(`paymentAmount_${i}`).addEventListener('input', () => {
                    updatePaymentFromAmount(i);
                    updateTotalSummary();
                });
                document.getElementById(`paymentPaid_${i}`).addEventListener('change', updateTotalSummary);
            }

            // 绑定事件
            document.getElementById('pageSelector').addEventListener('change', switchPage);
            document.getElementById('addProjectBtn').addEventListener('click', openAddModal);
            document.getElementById('closeModal').addEventListener('click', closeModal);
            document.getElementById('cancelBtn').addEventListener('click', closeModal);
            document.getElementById('saveBtn').addEventListener('click', saveProject);
            document.getElementById('closeLogModal').addEventListener('click', closeLogModal);
            document.getElementById('exportBtn').addEventListener('click', exportData);
            document.getElementById('importFile').addEventListener('change', importJsonData);
            document.getElementById('clearBtn').addEventListener('click', clearAll);
            document.getElementById('searchInput').addEventListener('input', renderCurrentPage);
            document.getElementById('prevMonth').addEventListener('click', prevMonth);
            document.getElementById('nextMonth').addEventListener('click', nextMonth);
            document.getElementById('closeTempModal').addEventListener('click', closeTempModal);
            document.getElementById('cancelTempBtn').addEventListener('click', closeTempModal);
            document.getElementById('saveTempBtn').addEventListener('click', saveTempWork);

            document.getElementById('modal').addEventListener('click', (e) => {
                if (e.target.id === 'modal') closeModal();
            });
            document.getElementById('logModal').addEventListener('click', (e) => {
                if (e.target.id === 'logModal') closeLogModal();
            });
            document.getElementById('tempModal').addEventListener('click', (e) => {
                if (e.target.id === 'tempModal') closeTempModal();
            });

            // 设置默认创建日期
            document.getElementById('createDate').value = todayStr;

            switchPage();
            renderCurrentPage();
            renderCalendar();

            // 监听总金额变化重新计算
            document.getElementById('totalAmount').addEventListener('input', () => {
                for (let i = 0; i < 5; i++) {
                    if (document.getElementById(`paymentPercent_${i}`).value) {
                        updatePaymentFromPercent(i);
                    }
                }
                updateTotalSummary();
            });
        });

        function switchPage() {
            const selected = document.getElementById('pageSelector').value;
            document.querySelectorAll('.page-view').forEach(el => el.classList.remove('active'));
            if (selected === 'list') {
                document.getElementById('listPage').classList.add('active');
            } else if (selected === 'kanban') {
                document.getElementById('kanbanPage').classList.add('active');
                renderBoard();
            } else if (selected === 'calendar') {
                document.getElementById('calendarPage').classList.add('active');
                renderCalendar();
            }
            updateStats();
        }

        function renderCurrentPage() {
            const selected = document.getElementById('pageSelector').value;
            if (selected === 'list') {
                renderList();
            } else if (selected === 'kanban') {
                renderBoard();
            } else if (selected === 'calendar') {
                renderCalendar();
            }
        }

        // === 数据存取 ===
        function getProjects() {
            const projects = localStorage.getItem('projects');
            const parsed = projects ? JSON.parse(projects) : [];
            parsed.forEach(project => {
                if (!project.logs) project.logs = [];
                if (!project.stageDates) project.stageDates = {};
            });
            return parsed;
        }

        function getTempWorks() {
            const temp = localStorage.getItem('tempWorks');
            return temp ? JSON.parse(temp) : [];
        }

        function saveProjects(projects) {
            localStorage.setItem('projects', JSON.stringify(projects));
        }

        function saveTempWorks(tempWorks) {
            localStorage.setItem('tempWorks', JSON.stringify(tempWorks));
        }

        // === 时间工具 ===
        function getCurrentTime() {
            const now = new Date();
            return now.toLocaleString('zh-CN');
        }

        // === 进度款计算 ===
        function updatePaymentFromPercent(index) {
            const total = parseFloat(document.getElementById('totalAmount').value);
            const percent = parseFloat(document.getElementById(`paymentPercent_${index}`).value);
            if (!isNaN(total) && !isNaN(percent)) {
                const amount = (total * percent / 100);
                document.getElementById(`paymentAmount_${index}`).value = amount.toFixed(2);
            }
        }

        function updatePaymentFromAmount(index) {
            const total = parseFloat(document.getElementById('totalAmount').value);
            const amount = parseFloat(document.getElementById(`paymentAmount_${index}`).value);
            if (!isNaN(total) && total > 0 && !isNaN(amount)) {
                const percent = (amount / total * 100);
                document.getElementById(`paymentPercent_${index}`).value = percent.toFixed(1);
            }
        }

        function updateTotalSummary() {
            const total = parseFloat(document.getElementById('totalAmount').value) || 0;
            let paidTotal = 0;
            for (let i = 0; i < 5; i++) {
                if (document.getElementById(`paymentPaid_${i}`).checked) {
                    const amount = parseFloat(document.getElementById(`paymentAmount_${i}`).value);
                    if (!isNaN(amount)) {
                        paidTotal += amount;
                    }
                }
            }
            const unpaidTotal = total - paidTotal;
            document.getElementById('paidTotal').textContent = `$${paidTotal.toFixed(2)}`;
            document.getElementById('unpaidTotal').textContent = `$${unpaidTotal.toFixed(2)}`;
        }



        function calculateDaysLeft(dateStr) {
            if (!dateStr) return null;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const target = new Date(dateStr);
            target.setHours(0, 0, 0, 0);
            return Math.ceil((target - today) / (1000 * 60 * 60 * 24));
        }

        // === 日志 ===
        function addLog(projectId, action, detail) {
            const projects = getProjects();
            const project = projects.find(p => p.id === projectId);
            if (!project) return;
            if (!project.logs) project.logs = [];
            project.logs.unshift({
                time: getCurrentTime(),
                action: action,
                detail: detail
            });
            saveProjects(projects);
        }

        function openLogModal(projectId) {
            const projects = getProjects();
            const project = projects.find(p => p.id === projectId);
            if (!project) {
                alert('找不到项目');
                return;
            }
            document.getElementById('logModalTitle').textContent = `修改日志 - ${project.name}`;
            const logBody = document.getElementById('logBody');
            if (!project.logs || project.logs.length === 0) {
                logBody.innerHTML = '<div class="empty-log">暂无修改记录</div>';
            } else {
                logBody.innerHTML = project.logs.map(log => `
                    <div class="log-item">
                        <div>
                            <span class="log-time">${escapeHtml(log.time)}</span>
                            <span class="log-action">${escapeHtml(log.action)}</span>
                        </div>
                        ${log.detail ? `<div class="log-detail">${escapeHtml(log.detail)}</div>` : ''}
                    </div>
                `).join('');
            }
            document.getElementById('logModal').classList.add('show');
        }

        function closeLogModal() {
            document.getElementById('logModal').classList.remove('show');
        }

        // === 弹窗操作 ===
        function openAddModal() {
            document.getElementById('modalTitle').textContent = '添加新项目';
            document.getElementById('projectForm').reset();
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('createDate').value = today;
            document.getElementById('editId').value = '';
            stages.forEach((s, i) => {
                document.getElementById(`stageDate_${i}`).value = '';
            });
            document.getElementById('currentStage').value = '0';
            document.getElementById('modal').classList.add('show');
        }

        function openEditModal(project) {
            document.getElementById('modalTitle').textContent = '编辑项目';
            document.getElementById('editId').value = project.id;
            document.getElementById('projectName').value = project.name;
            document.getElementById('createDate').value = project.createDate;
            document.getElementById('expectedDate').value = project.expectedDate || '';
            document.getElementById('currentStage').value = project.currentStage || 0;
            document.getElementById('totalAmount').value = project.totalAmount || '';
            document.getElementById('description').value = project.description || '';

            stages.forEach((s, i) => {
                document.getElementById(`stageDate_${i}`).value = project.stageDates ? (project.stageDates[i] || '') : '';
            });

            // 填充进度款
            if (project.progressPayments) {
                project.progressPayments.forEach((p, i) => {
                    if (p) {
                        document.getElementById(`paymentPercent_${i}`).value = p.percent || '';
                        document.getElementById(`paymentAmount_${i}`).value = p.amount || '';
                        document.getElementById(`paymentNote_${i}`).value = p.note || '';
                        document.getElementById(`paymentPaid_${i}`).checked = !!p.paid;
                    }
                });
            } else {
                // 清空
                for (let i = 0; i < 5; i++) {
                    document.getElementById(`paymentPercent_${i}`).value = '';
                    document.getElementById(`paymentAmount_${i}`).value = '';
                    document.getElementById(`paymentNote_${i}`).value = '';
                    document.getElementById(`paymentPaid_${i}`).checked = false;
                }
            }

            // 触发一次计算更新
            updateTotalSummary();
            document.getElementById('modal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }

        function saveProject() {
            const projects = getProjects();
            const editId = document.getElementById('editId').value;

            // 收集各阶段日期
            const stageDates = {};
            stages.forEach((s, i) => {
                stageDates[i] = document.getElementById(`stageDate_${i}`).value || '';
            });

            // 收集进度款
            const progressPayments = [];
            for (let i = 0; i < 5; i++) {
                const percent = document.getElementById(`paymentPercent_${i}`).value;
                const amount = document.getElementById(`paymentAmount_${i}`).value;
                const note = document.getElementById(`paymentNote_${i}`).value;
                const paid = document.getElementById(`paymentPaid_${i}`).checked;
                if (percent || amount) {
                    progressPayments.push({
                        percent: percent ? parseFloat(percent) : null,
                        amount: amount ? parseFloat(amount) : null,
                        note: note,
                        paid: paid
                    });
                } else {
                    progressPayments.push(null);
                }
            }

            const currentStage = parseInt(document.getElementById('currentStage').value);
            const project = {
                id: editId ? parseInt(editId) : Date.now(),
                name: document.getElementById('projectName').value.trim(),
                createDate: document.getElementById('createDate').value || new Date().toISOString().split('T')[0],
                expectedDate: document.getElementById('expectedDate').value,
                currentStage: currentStage,
                progress: stages[currentStage].progress,
                totalAmount: document.getElementById('totalAmount').value ? parseFloat(document.getElementById('totalAmount').value) : null,
                description: document.getElementById('description').value.trim(),
                stageDates: stageDates,
                progressPayments: progressPayments
            };

            if (editId) {
                const index = projects.findIndex(p => p.id === project.id);
                if (index >= 0) {
                    // 保留原有日志
                    project.logs = projects[index].logs || [];
                    projects[index] = project;
                    addLog(project.id, '编辑项目', `修改为 ${stages[currentStage].name}`);
                }
            } else {
                project.logs = [{
                    time: getCurrentTime(),
                    action: '创建项目',
                    detail: `初始阶段 ${stages[currentStage].name}`
                }];
                projects.unshift(project);
            }

            saveProjects(projects);
            closeModal();
            renderCurrentPage();
            updateStats();
        }

        function deleteProject(id) {
            if (!confirm('确定要删除这个项目吗？')) return;
            let projects = getProjects();
            projects = projects.filter(p => p.id !== id);
            saveProjects(projects);
            renderCurrentPage();
            updateStats();
        }

        function moveToStage(projectId, newStage) {
            const projects = getProjects();
            const project = projects.find(p => p.id === projectId);
            if (project) {
                const oldStageName = stages[project.currentStage].name;
                const newStageName = stages[newStage].name;
                project.currentStage = newStage;
                project.progress = stages[newStage].progress;
                addLog(projectId, '移动阶段', `${oldStageName} → ${newStageName}`);
                saveProjects(projects);
                renderCurrentPage();
                updateStats();
            }
        }

        function nextStage(id) {
            const projects = getProjects();
            const project = projects.find(p => p.id === id);
            if (project && project.currentStage < 6) {
                moveToStage(id, project.currentStage + 1);
            }
        }

        function prevStage(id) {
            const projects = getProjects();
            const project = projects.find(p => p.id === id);
            if (project && project.currentStage > 0) {
                moveToStage(id, project.currentStage - 1);
            }
        }

        // === 项目列表视图 ===
        function renderList() {
            const projects = getProjects();
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const filtered = projects.filter(p => 
                !searchText || 
                p.name.toLowerCase().includes(searchText) || 
                (p.description && p.description.toLowerCase().includes(searchText))
            );

            // 按预期完成日期排序
            filtered.sort((a, b) => {
                if (!a.expectedDate) return 1;
                if (!b.expectedDate) return -1;
                return a.expectedDate.localeCompare(b.expectedDate);
            });

            const container = document.getElementById('listContainer');
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #999; padding: 40px;">暂无匹配项目</div>';
                return;
            }

            container.innerHTML = filtered.map(project => {
                const stageInfo = stages[project.currentStage];

                // 计算付款统计
                let paidTotal = 0;
                let totalPercent = 0;
                if (project.progressPayments && project.totalAmount) {
                    project.progressPayments.forEach(p => {
                        if (p && p.paid && p.amount) {
                            paidTotal += p.amount;
                        }
                        if (p && p.percent) {
                            totalPercent += p.percent;
                        }
                    });
                }

                let paymentHtml = '';
                if (project.totalAmount) {
                    paymentHtml = `| 总额: $${project.totalAmount.toFixed(2)} | 已收: $${paidTotal.toFixed(2)} (${Math.round(totalPercent)}%)`;
                }

                return `
                    <div class="list-item">
                        <div class="list-info">
                            <div class="list-name">${escapeHtml(project.name)}</div>
                            <div class="list-meta">
                                当前阶段：${stageInfo.name} | 进度：${stageInfo.progress}% 
                                ${project.expectedDate ? `| 预期完成：${project.expectedDate}` : ''}
                                ${paymentHtml}
                            </div>
                        </div>
                        <div class="list-actions">
                            ${project.currentStage > 0 ? `<button class="btn-success" onclick="prevStage(${project.id})">上一阶段</button>` : ''}
                            ${project.currentStage < 6 ? `<button class="btn-success" onclick="nextStage(${project.id})">下一阶段</button>` : ''}
                            <button class="btn-primary" onclick="openLogModal(${project.id})">日志</button>
                            <button class="btn-primary" onclick="openEditModal(${project.id})">编辑</button>
                            <button class="btn-danger" onclick="deleteProject(${project.id})">删除</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // === 看板视图 ===
        function renderBoard() {
            const projects = getProjects();
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            const filtered = projects.filter(p => 
                !searchText || 
                p.name.toLowerCase().includes(searchText) || 
                (p.description && p.description.toLowerCase().includes(searchText))
            );

            // 按阶段分组
            const grouped = {};
            stages.forEach(s => grouped[s.id] = []);
            filtered.forEach(project => {
                grouped[project.currentStage].push(project);
            });

            // 每个阶段内部按当前阶段日期排序
            stages.forEach(s => {
                grouped[s.id].sort((a, b) => {
                    const dateA = a.stageDates ? (a.stageDates[a.currentStage] || '') : '';
                    const dateB = b.stageDates ? (b.stageDates[b.currentStage] || '') : '';
                    if (!dateA) return 1;
                    if (!dateB) return -1;
                    return dateA.localeCompare(dateB);
                });
            });

            const board = document.getElementById('kanbanBoard');
            board.innerHTML = '';

            stages.forEach(stage => {
                const column = document.createElement('div');
                column.className = 'kanban-column';
                column.innerHTML = `
                    <div class="column-header">
                        ${stage.name}
                        <span class="count-badge">${grouped[stage.id].length}</span>
                    </div>
                `;

                if (grouped[stage.id].length === 0) {
                    column.innerHTML += '<div class="empty-column">暂无项目</div>';
                } else {
                    grouped[stage.id].forEach(project => {
                        const card = document.createElement('div');
                        card.className = 'kanban-card';
                        card.draggable = true;

                        const currentDate = project.stageDates ? (project.stageDates[project.currentStage] || '') : '';
                        const daysLeft = currentDate ? calculateDaysLeft(currentDate) : null;

                        let badge = '';
                        if (daysLeft !== null && daysLeft < 0) {
                            badge = `<span class="danger-badge">逾期 ${Math.abs(daysLeft)} 天</span>`;
                        } else if (daysLeft !== null && daysLeft <= 3) {
                            badge = `<span class="danger-badge">剩余 ${daysLeft} 天</span>`;
                        }

                        let isOverdue = daysLeft !== null && daysLeft < 0;
                        card.className += isOverdue ? ' overdue' : '';

                        // 计算付款统计
                        let paidTotal = 0;
                        let totalPercent = 0;
                        if (project.progressPayments && project.totalAmount) {
                            project.progressPayments.forEach(p => {
                                if (p && p.paid && p.amount) {
                                    paidTotal += p.amount;
                                }
                                if (p && p.percent) {
                                    totalPercent += p.percent;
                                }
                            });
                        }

                        let paymentInfo = '';
                        if (project.totalAmount) {
                            paymentInfo = `<div class="card-info" style="margin-top: 4px;">
                                <span>总额: $${project.totalAmount.toFixed(2)} | 已收: $${paidTotal.toFixed(2)}</span>
                            </div>`;
                        }

                        card.innerHTML = `
                            <div class="card-title">${escapeHtml(project.name)}</div>
                            <div class="card-info">
                                <span class="card-stage-date">计划日期：${currentDate || '未设置'}</span>
                                ${badge}
                            </div>
                            ${paymentInfo}
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${project.progress}%"></div>
                            </div>
                            <div class="card-actions">
                                ${project.currentStage > 0 ? `<button class="btn-success" onclick="event.stopPropagation(); prevStage(${project.id})">上一阶段</button>` : ''}
                                ${project.currentStage < 6 ? `<button class="btn-success" onclick="event.stopPropagation(); nextStage(${project.id})">下一阶段</button>` : ''}
                                <button class="btn-primary" onclick="event.stopPropagation(); openLogModal(${project.id})">日志</button>
                                <button class="btn-primary" onclick="event.stopPropagation(); openEditModal(${project.id})">编辑</button>
                                <button class="btn-danger" onclick="event.stopPropagation(); deleteProject(${project.id})">删除</button>
                            </div>
                        `;

                        card.addEventListener('dragstart', () => {
                            draggedProject = project;
                            card.classList.add('dragging');
                        });
                        card.addEventListener('dragend', () => {
                            draggedProject = null;
                            card.classList.remove('dragging');
                        });

                        column.appendChild(card);
                    });
                }

                column.addEventListener('dragover', e => e.preventDefault());
                column.addEventListener('drop', e => {
                    e.preventDefault();
                    if (draggedProject && draggedProject.currentStage !== stage.id) {
                        moveToStage(draggedProject.id, stage.id);
                    }
                });

                board.appendChild(column);
            });
        }

        // === 日历视图 ===
        function prevMonth() {
            currentCalendar.month--;
            if (currentCalendar.month < 0) {
                currentCalendar.month = 11;
                currentCalendar.year--;
            }
            renderCalendar();
        }

        function nextMonth() {
            currentCalendar.month++;
            if (currentCalendar.month > 11) {
                currentCalendar.month = 0;
                currentCalendar.year++;
            }
            renderCalendar();
        }

        function renderCalendar() {
            const { year, month } = currentCalendar;
            const projects = getProjects();
            const tempWorks = getTempWorks();

            document.getElementById('calendarMonth').textContent = `${year}年 ${month + 1}月`;

            // 计算当月第一天
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startDayOfWeek = firstDay.getDay(); // 0-6, 0周日
            const today = new Date();
            const isToday = (y, m, d) => y === today.getFullYear() && m === today.getMonth() && d === today.getDate();

            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            // 星期表头
            ['日', '一', '二', '三', '四', '五', '六'].forEach(day => {
                const el = document.createElement('div');
                el.className = 'calendar-weekday';
                el.textContent = day;
                grid.appendChild(el);
            });

            // 前面补上月的空白
            for (let i = 0; i < startDayOfWeek; i++) {
                const el = document.createElement('div');
                el.className = 'calendar-day other-month';
                grid.appendChild(el);
            }

            // 生成日期格子
            for (let day = 1; day <= lastDay.getDate(); day++) {
                const dateStr = `${year}-${String(month+1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const el = document.createElement('div');
                el.className = 'calendar-day';
                if (isToday(year, month, day)) {
                    el.classList.add('today');
                }
                if (year !== currentCalendar.year || (year === currentCalendar.year && month !== currentCalendar.month)) {
                    el.classList.add('other-month');
                }

                el.innerHTML = `
                    <div class="day-number">
                        ${day}
                        <button class="add-temp-btn" onclick="openAddTemp('${dateStr}')">+</button>
                    </div>
                    <div class="day-events"></div>
                `;

                // 收集今天当前阶段日期匹配的项目
                const todayProjects = projects.filter(p => {
                    if (!p.stageDates) return false;
                    return p.stageDates[p.currentStage] === dateStr;
                });

                const todayTemps = tempWorks.filter(t => t.date === dateStr);

                todayProjects.forEach(p => {
                    const ev = document.createElement('div');
                    ev.className = 'calendar-event project';
                    ev.textContent = p.name;
                    ev.onclick = () => openEditModal(p);
                    el.querySelector('.day-events').appendChild(ev);
                });

                todayTemps.forEach(t => {
                    const ev = document.createElement('div');
                    ev.className = 'calendar-event temp';
                    ev.textContent = t.title;
                    ev.onclick = () => editTempWork(t.id);
                    el.querySelector('.day-events').appendChild(ev);
                });

                grid.appendChild(el);
            }

            // 补后面下个月的空白
            const totalCells = startDayOfWeek + lastDay.getDate();
            const remaining = 7 - (totalCells % 7);
            if (remaining < 7) {
                for (let i = 0; i < remaining; i++) {
                    const el = document.createElement('div');
                    el.className = 'calendar-day other-month';
                    grid.appendChild(el);
                }
            }
        }

        function openAddTemp(dateStr) {
            pendingTempDate = dateStr;
            document.getElementById('tempDate').value = dateStr;
            document.getElementById('tempForm').reset();
            document.getElementById('tempModalTitle').textContent = `添加临时工作 - ${dateStr}`;
            document.getElementById('tempModal').classList.add('show');
        }

        function closeTempModal() {
            document.getElementById('tempModal').classList.remove('show');
            pendingTempDate = null;
        }

        function saveTempWork() {
            const tempWorks = getTempWorks();
            const date = document.getElementById('tempDate').value;
            const title = document.getElementById('tempTitle').value.trim();
            const note = document.getElementById('tempNote').value.trim();

            if (!title) {
                alert('请输入工作标题');
                return;
            }

            const temp = {
                id: Date.now(),
                date: date,
                title: title,
                note: note,
                createTime: getCurrentTime()
            };

            tempWorks.unshift(temp);
            saveTempWorks(tempWorks);
            closeTempModal();
            renderCalendar();
        }

        function editTempWork(id) {
            const tempWorks = getTempWorks();
            const temp = tempWorks.find(t => t.id === id);
            if (!temp) return;

            if (confirm(`确定要删除临时工作：${temp.title} 吗？`)) {
                const newList = tempWorks.filter(t => t.id !== id);
                saveTempWorks(newList);
                renderCalendar();
            }
        }

        // === 导入导出 ===
        function exportData() {
            const data = {
                projects: getProjects(),
                tempWorks: getTempWorks()
            };
            const dataStr = JSON.stringify(data, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'project-management-backup.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function importJsonData(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const imported = JSON.parse(event.target.result);
                    if (imported.projects && Array.isArray(imported.projects)) {
                        if (!confirm(`确认导入 ${imported.projects.length} 个项目？会覆盖现有数据。`)) return;
                        saveProjects(imported.projects);
                        if (imported.tempWorks && Array.isArray(imported.tempWorks)) {
                            saveTempWorks(imported.tempWorks);
                        }
                        renderCurrentPage();
                        updateStats();
                        alert(`导入成功！共 ${imported.projects.length} 个项目`);
                    } else if (Array.isArray(imported)) {
                        // 兼容旧格式
                        if (!confirm(`确认导入 ${imported.length} 个项目？会覆盖现有数据。`)) return;
                        saveProjects(imported);
                        renderCurrentPage();
                        updateStats();
                        alert(`导入成功！共 ${imported.length} 个项目`);
                    } else {
                        alert('格式不正确');
                    }
                    e.target.value = '';
                } catch (err) {
                    alert('导入失败：' + err.message);
                }
            };
            reader.readAsText(file);
        }

        function clearAll() {
            if (!confirm('确定要清空所有项目和临时工作吗？此操作不可恢复！')) return;
            localStorage.removeItem('projects');
            localStorage.removeItem('tempWorks');
            renderCurrentPage();
            updateStats();
        }

        // === 统计 ===
        function updateStats() {
            const projects = getProjects();
            const total = projects.length;
            const counts = stages.map(() => 0);
            projects.forEach(p => counts[p.currentStage]++);
            const completed = counts[6];
            const todo = total - completed;
            document.getElementById('stats').innerHTML = `
                总计: ${total} | 进行中: ${todo} | 已交付: ${completed}
            `;
        }

        // === HTML转义 ===
        function escapeHtml(text) {
            if (!text) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return String(text).replace(/[&<>"]/g, m => map[m]);
        }
    </script>
</body>
</html>
