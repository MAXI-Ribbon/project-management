        function renderDeliveredPage() {
            const projects = getProjects().filter(project => project.currentStage === 7);
            const searchText = document.getElementById('searchInput').value.toLowerCase().trim();
            const summaryContainer = document.getElementById('deliveredSummaryContainer');
            const container = document.getElementById('deliveredProjectsContainer');
            if (!summaryContainer || !container) return;
            if (projects.length === 0) {
                deliveredSelectedMonth = 'all';
                summaryContainer.innerHTML = '<div class="delivered-summary-empty">暂无交付记录</div>';
                container.innerHTML = '<div class="empty-column">暂无已交付项目</div>';
                return;
            }

            // 计算每个项目已收款总额
            function calculatePaidTotal(project) {
                if (!project.progressPayments || !Array.isArray(project.progressPayments)) return 0;
                return project.progressPayments.reduce((sum, payment) => {
                    if (payment && payment.paid && Number.isFinite(payment.amount)) {
                        return sum + payment.amount;
                    }
                    return sum;
                }, 0);
            }

            const projectsWithMonthKey = projects.map(project => ({
                project,
                monthKey: getYearMonthKey(resolveDeliveredMonthSource(project)),
                totalAmount: Number.isFinite(project.totalAmount) ? project.totalAmount : 0,
                paidAmount: calculatePaidTotal(project)
            }));

            const summaryByMonth = {};
            const unknownBucket = { amount: 0, count: 0, paid: 0 };
            projectsWithMonthKey.forEach(({ project, monthKey, totalAmount, paidAmount }) => {
                if (monthKey) {
                    if (!summaryByMonth[monthKey]) {
                        summaryByMonth[monthKey] = { amount: 0, count: 0, paid: 0 };
                    }
                    summaryByMonth[monthKey].amount += totalAmount;
                    summaryByMonth[monthKey].paid += paidAmount;
                    summaryByMonth[monthKey].count += 1;
                } else {
                    unknownBucket.amount += totalAmount;
                    unknownBucket.paid += paidAmount;
                    unknownBucket.count += 1;
                }
            });

            const monthKeys = Object.keys(summaryByMonth).sort((a, b) => b.localeCompare(a));
            const summaryCards = monthKeys.map(key => ({
                value: key,
                label: formatYearMonthLabel(key),
                amount: summaryByMonth[key].amount,
                paid: summaryByMonth[key].paid,
                count: summaryByMonth[key].count
            }));
            if (unknownBucket.count > 0) {
                summaryCards.push({
                    value: 'unknown',
                    label: '未知月份',
                    amount: unknownBucket.amount,
                    paid: unknownBucket.paid,
                    count: unknownBucket.count
                });
            }

            const totalAmount = summaryCards.reduce((sum, card) => sum + card.amount, 0);
            const totalPaid = summaryCards.reduce((sum, card) => sum + (card.paid || 0), 0);
            const totalCount = summaryCards.reduce((sum, card) => sum + card.count, 0);
            const aggregatedCard = { value: 'all', label: '全部月份', amount: totalAmount, paid: totalPaid, count: totalCount };

            const monthOptions = [
                { value: 'all', label: '全部月份' },
                ...monthKeys.map(key => ({ value: key, label: formatYearMonthLabel(key) }))
            ];
            if (unknownBucket.count > 0) {
                monthOptions.push({ value: 'unknown', label: '未知月份' });
            }

            let selectedMonth = deliveredSelectedMonth;
            if (selectedMonth === 'unknown' && unknownBucket.count === 0) {
                selectedMonth = 'all';
            }
            if (selectedMonth !== 'all' && selectedMonth !== 'unknown' && !summaryByMonth[selectedMonth]) {
                selectedMonth = 'all';
            }

            let selectedStats = {
                amount: totalAmount,
                paid: totalPaid,
                count: totalCount,
                label: '全部月份'
            };
            if (selectedMonth === 'unknown') {
                selectedStats = {
                    amount: unknownBucket.amount,
                    paid: unknownBucket.paid,
                    count: unknownBucket.count,
                    label: '未知月份'
                };
            } else if (selectedMonth !== 'all') {
                const matched = summaryByMonth[selectedMonth] || { amount: 0, paid: 0, count: 0 };
                selectedStats = {
                    amount: matched.amount,
                    paid: matched.paid,
                    count: matched.count,
                    label: formatYearMonthLabel(selectedMonth)
                };
            }

            const unpaidAmount = selectedStats.amount - (selectedStats.paid || 0);

            deliveredSelectedMonth = selectedMonth;

            const cardsForGrid = [aggregatedCard, ...summaryCards];
            summaryContainer.innerHTML = `
                <div class="delivered-summary-header">
                    <div class="delivered-summary-controls">
                        <label for="deliveredMonthSelect">筛选月份：</label>
                        <select id="deliveredMonthSelect">
                            ${monthOptions.map(option => `<option value="${option.value}">${escapeHtml(option.label)}</option>`).join('')}
                        </select>
                    </div>
                    <div class="delivered-summary-selected">
                        <div class="delivered-summary-label">${escapeHtml(selectedStats.label)}</div>
                        <div style="display:flex; gap: 20px; flex-wrap: wrap;">
                            <div>
                                <div class="delivered-summary-amount">${formatMoney(selectedStats.amount)}</div>
                                <div class="delivered-summary-count">总金额</div>
                            </div>
                            <div>
                                <div class="delivered-summary-amount">${formatMoney(selectedStats.paid || 0)}</div>
                                <div class="delivered-summary-count">已收款</div>
                            </div>
                            <div style="${unpaidAmount > 0 ? 'color: #ff4d4f;' : ''}">
                                <div class="delivered-summary-amount">${formatMoney(unpaidAmount)}</div>
                                <div class="delivered-summary-count">未收款</div>
                            </div>
                        </div>
                        <div class="delivered-summary-count">项目数：${selectedStats.count}</div>
                    </div>
                </div>
                <div class="delivered-summary-grid">
                    ${cardsForGrid.map(card => {
                        const cardUnpaid = (card.amount || 0) - (card.paid || 0);
                        return `
                        <div class="delivered-summary-card${card.value === selectedMonth ? ' selected' : ''}">
                            <div class="delivered-summary-card-title">${escapeHtml(card.label)}</div>
                            <div class="delivered-summary-card-amount">${formatMoney(card.amount)}</div>
                            ${cardUnpaid > 0 ? `<div style="color: #ff4d4f; font-size: 12px; margin-top: 2px;">未收：${formatMoney(cardUnpaid)}</div>` : ''}
                            <div class="delivered-summary-card-count">项目数：${card.count}</div>
                        </div>
                    `;
                    }).join('')}
                </div>
            `;

            const monthSelect = document.getElementById('deliveredMonthSelect');
            if (monthSelect) {
                monthSelect.value = selectedMonth;
                monthSelect.addEventListener('change', (event) => {
                    deliveredSelectedMonth = event.target.value;
                    renderDeliveredPage();
                });
            }

            // 获取筛选条件
            const dateStart = document.getElementById('deliveredDateStart').value;
            const dateEnd = document.getElementById('deliveredDateEnd').value;
            const paymentFilter = document.getElementById('deliveredPaymentFilter').value;
            const sortBy = document.getElementById('deliveredSortBy').value;

            // 第一步：按月筛选
            let filtered = projectsWithMonthKey
                .filter(({ monthKey }) => {
                    if (selectedMonth === 'all') return true;
                    if (selectedMonth === 'unknown') return !monthKey;
                    return monthKey === selectedMonth;
                })
                .map(({ project, totalAmount, paidAmount }) => ({
                    project,
                    totalAmount,
                    paidAmount,
                    unpaidAmount: totalAmount - paidAmount
                }));

            // 第二步：日期范围筛选
            filtered = filtered.filter(({ project }) => {
                const deliveredDate = resolveDeliveredDate(project);
                if (!deliveredDate) return true; // 没有日期不筛选
                if (dateStart && deliveredDate < dateStart) return false;
                if (dateEnd && deliveredDate > dateEnd) return false;
                return true;
            });

            // 第三步：付款状态筛选
            filtered = filtered.filter(({ unpaidAmount, totalAmount }) => {
                if (paymentFilter === 'all') return true;
                if (paymentFilter === 'paid') return totalAmount <= 0 || unpaidAmount <= 0;
                if (paymentFilter === 'unpaid') return unpaidAmount > 0;
                return true;
            });

            // 第四步：搜索文本筛选（针对交付页面内容）
            if (searchText) {
                filtered = filtered.filter(({ project }) => {
                    const haystacks = [
                        project.name || '',
                        project.description || '',
                        resolveDeliveredDate(project) || '',
                        (stages[7] && stages[7].name) || ''
                    ].map(v => String(v).toLowerCase());
                    return haystacks.some(v => v.includes(searchText));
                });
            }

            // 提取项目数组
            let filteredProjects = filtered.map(item => item.project);

            // 排序
            const sorted = filteredProjects.slice().sort((a, b) => {
                const paidTotalA = calculatePaidTotal(a);
                const totalA = Number.isFinite(a.totalAmount) ? a.totalAmount : 0;
                const unpaidA = totalA - paidTotalA;

                const paidTotalB = calculatePaidTotal(b);
                const totalB = Number.isFinite(b.totalAmount) ? b.totalAmount : 0;
                const unpaidB = totalB - paidTotalB;

                const dateA = resolveDeliveredDate(a) || '';
                const dateB = resolveDeliveredDate(b) || '';

                switch (sortBy) {
                    case 'deliveredDate-asc':
                        return dateA.localeCompare(dateB);
                    case 'deliveredDate-desc':
                        return dateB.localeCompare(dateA);
                    case 'totalAmount-desc':
                        return totalB - totalA;
                    case 'unpaid-desc':
                        return unpaidB - unpaidA;
                    default:
                        return dateB.localeCompare(dateA);
                }
            });

            if (sorted.length === 0) {
                container.innerHTML = '<div class="empty-column">暂无已交付项目</div>';
                return;
            }

            container.innerHTML = sorted.map(project => {
                const stageInfo = stages[project.currentStage] || {};
                const deliveredDate = resolveDeliveredDate(project);
                const paidTotal = calculatePaidTotal(project);
                const total = Number.isFinite(project.totalAmount) ? project.totalAmount : 0;
                const unpaid = total - paidTotal;
                const cardClass = unpaid > 0 ? 'delivered-project-card unpaid' : 'delivered-project-card';
                return `
                    <div class="${cardClass}">
                        <div class="list-title-row">
                            <div class="list-name">${escapeHtml(project.name)}${project.deliveryType ? renderDeliveryTypeBadge(project.deliveryType) : ''}</div>
                            <div class="card-actions">
                                <button class="btn-primary" onclick="openLogModal(${project.id})">日志</button>
                                <button class="btn-primary" onclick="openEditModal(${project.id})">编辑</button>
                                <button class="btn-danger" onclick="deleteProject(${project.id})">删除</button>
                            </div>
                        </div>
                        <div class="card-info">
                            <span>阶段：${stageInfo.name || 'Delivered'}</span>
                            ${deliveredDate ? `<span>交付日期：${deliveredDate}</span>` : ''}
                            ${project.expectedDate ? `<span>预期：${project.expectedDate}</span>` : ''}
                            ${project.deliveryType ? `<span>${renderDeliveryTypeBadge(project.deliveryType)}</span>` : ''}
                            ${total > 0 ? `<span>总额：${formatMoney(total)}</span>` : ''}
                            ${unpaid > 0 ? `<span style="color: #ff4d4f; font-weight: 500;">未收：${formatMoney(unpaid)}</span>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // === 收集所有项目阶段事件 ===
        function getAllProjectEvents() {
            const projects = getProjects();
            const events = [];
            projects.forEach(project => {
                // 添加预期完成日期
                if (project.expectedDate) {
                    events.push({
                        date: project.expectedDate,
                        projectId: project.id,
                        stageId: 'expected',
                        stageName: '预期完成',
                        projectName: project.name
                    });
                }
                // 添加所有阶段日期
                if (project.stageDates) {
                    Object.keys(project.stageDates).forEach(stageId => {
                        const dateStr = project.stageDates[stageId];
                        const stage = getStageById(stageId);
                        if (!dateStr || !stage) return;
                        events.push({
                            date: dateStr,
                            projectId: project.id,
                            stageId: stage.id,
                            stageName: stage.name,
                            projectName: project.name
                        });
                    });
                }
            });
            return events;
        }

        // === 获取ISO周日序号 => 第几周
        function getWeekNumber(date) {
            const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            const dayNum = d.getDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        // === 从日期获取周一所在的周
        function getFirstDayOfWeek(year, week) {
            const date = new Date(year, 0, 1 + (week - 1) * 7);
            const day = date.getDay();
            return new Date(date.setDate(date.getDate() - day));
        }

        // === 日历视图：日/周/月 统一渲染入口 ===
        function renderCalendar() {
            document.getElementById('calendarView').value = calendarView;

            switch (calendarView) {
                case 'day':
                    renderDayView();
                    break;
                case 'week':
                    renderWeekView();
                    break;
                case 'month':
                    renderMonthView();
                    break;
            }
        }

        // 上一页/下一页 统一处理
        function prevCalendar() {
            switch (calendarView) {
                case 'day':
                    currentDay.day--;
                    const d1 = new Date(currentDay.year, currentDay.month, currentDay.day);
                    currentDay.year = d1.getFullYear();
                    currentDay.month = d1.getMonth();
                    currentDay.day = d1.getDate();
                    break;
                case 'week':
                    currentWeek.week--;
                    if (currentWeek.week < 1) {
                        currentWeek.week = getWeekNumber(new Date(currentWeek.year - 1, 11, 31));
                        currentWeek.year--;
                    }
                    break;
                case 'month':
                    currentCalendar.month--;
                    if (currentCalendar.month < 0) {
                        currentCalendar.month = 11;
                        currentCalendar.year--;
                    }
                    break;
            }
            renderCalendar();
        }

        function nextCalendar() {
            switch (calendarView) {
                case 'day':
                    currentDay.day++;
                    const d1 = new Date(currentDay.year, currentDay.month, currentDay.day);
                    currentDay.year = d1.getFullYear();
                    currentDay.month = d1.getMonth();
                    currentDay.day = d1.getDate();
                    break;
                case 'week':
                    currentWeek.week++;
                    const maxWeek = getWeekNumber(new Date(currentWeek.year, 11, 31));
                    if (currentWeek.week > maxWeek) {
                        currentWeek.week = 1;
                        currentWeek.year++;
                    }
                    break;
                case 'month':
                    currentCalendar.month++;
                    if (currentCalendar.month > 11) {
                        currentCalendar.month = 0;
                        currentCalendar.year++;
                    }
                    break;
            }
            renderCalendar();
        }

        // === 月视图渲染 (原有逻辑，升级显示所有阶段) ===
        function renderMonthView() {
            const { year, month } = currentCalendar;
            document.getElementById('calendarMonth').textContent = `${year}年 ${month + 1}月`;

            const today = new Date();
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startDayOfWeek = firstDay.getDay(); // 0 = 周日
            const daysInMonth = lastDay.getDate();

            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = 'repeat(7, 1fr)';

            // 星期表头
            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            weekdays.forEach(w => {
                const div = document.createElement('div');
                div.className = 'calendar-weekday';
                div.textContent = w;
                grid.appendChild(div);
            });

            const allEvents = getAllProjectEvents();
            const tempWorks = getTempWorks();

            // 上个月填充
            const prevLastDay = new Date(year, month, 0).getDate();
            for (let i = 0; i < startDayOfWeek; i++) {
                const div = document.createElement('div');
                div.className = 'calendar-day other-month';
                div.innerHTML = `<div class="day-number">${prevLastDay - (startDayOfWeek - i - 1)}</div>`;
                grid.appendChild(div);
            }

            // 当月天数
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(year, month, day);
                const dateStr = new Date(date.getTime() - date.getTimezoneOffset() * 60000).toISOString().split('T')[0];

                let classes = 'calendar-day';
                // 高亮今天
                if (date.getFullYear() === today.getFullYear() &&
                    date.getMonth() === today.getMonth() &&
                    date.getDate() === today.getDate()) {
                    classes += ' today';
                }

                const div = document.createElement('div');
                div.className = classes;
                div.innerHTML = `<div class="day-number">${day}<button class="add-temp-btn" onclick="openAddTempWork('${dateStr}')">+</button></div>`;

                // 获取当天项目阶段事件
                const dayEvents = allEvents.filter(ev => ev.date === dateStr);
                dayEvents.forEach(ev => {
                    const divEv = document.createElement('div');
                    const stageClass = getStageEventClass(ev.stageId);
                    divEv.className = `calendar-event project ${stageClass}`;
                    divEv.draggable = true;
                    divEv.textContent = `${ev.projectName} (${ev.stageName})`;
                    divEv.onclick = () => openEditModal(ev.projectId);
                    divEv.addEventListener('dragstart', (e) => {
                        draggedProject = { id: ev.projectId, stageId: ev.stageId };
                        divEv.classList.add('dragging');
                        e.dataTransfer.effectAllowed = 'move';
                    });
                    divEv.addEventListener('dragend', () => {
                        draggedProject = null;
                        divEv.classList.remove('dragging');
                    });
                    div.appendChild(divEv);
                });

                // 获取当天临时工作
                const dayTemps = tempWorks.filter(t => t.date === dateStr);
                dayTemps.forEach(t => {
                    const ev = document.createElement('div');
                    ev.className = 'calendar-event temp';
                    ev.textContent = t.title;
                    ev.onclick = () => openTempDetail(t);
                    div.appendChild(ev);
                });

                // 允许拖放项目到这个日期
                div.addEventListener('dragover', (e) => {
                    e.preventDefault();
                });
                div.addEventListener('drop', (e) => {
                    e.preventDefault();
                    if (draggedProject && draggedProject.id !== undefined && draggedProject.stageId !== undefined) {
                        updateProjectStageDate(draggedProject.id, draggedProject.stageId, dateStr);
                        renderCalendar();
                        renderProjectList();
                        renderKanban();
                    }
                });

                grid.appendChild(div);
            }

            // 下个月填充
            const daysNeeded = 42 - (startDayOfWeek + daysInMonth);
            for (let i = 1; i <= daysNeeded; i++) {
                const div = document.createElement('div');
                div.className = 'calendar-day other-month';
                div.innerHTML = `<div class="day-number">${i}</div>`;
                grid.appendChild(div);
            }
        }

        // === 周视图渲染 ===
        function renderWeekView() {
            const { year, week } = currentWeek;
            document.getElementById('calendarMonth').textContent = `${year}年 第${week}周`;

            const start = getFirstDayOfWeek(year, week);
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = 'repeat(7, 1fr)';

            // 添加星期表头
            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            weekdays.forEach(w => {
                const div = document.createElement('div');
                div.className = 'calendar-weekday';
                div.textContent = w;
                grid.appendChild(div);
            });

            const allEvents = getAllProjectEvents();
            const tempWorks = getTempWorks();
            const today = new Date();

            for (let i = 0; i < 7; i++) {
                const date = new Date(start);
                date.setDate(start.getDate() + i);
                const dateStr = new Date(date.getTime() - date.getTimezoneOffset() * 60000).toISOString().split('T')[0];

                let classes = 'calendar-day';
                if (date.getFullYear() === today.getFullYear() &&
                    date.getMonth() === today.getMonth() &&
                    date.getDate() === today.getDate()) {
                    classes += ' today';
                }

                const div = document.createElement('div');
                div.className = classes;
                div.style.minHeight = '150px';
                div.innerHTML = `<div class="day-number">${date.getDate()} (${date.getMonth() + 1}月)<button class="add-temp-btn" onclick="openAddTempWork('${dateStr}')">+</button></div>`;

                const dayEvents = allEvents.filter(ev => ev.date === dateStr);
                dayEvents.forEach(ev => {
                    const divEv = document.createElement('div');
                    const stageClass = getStageEventClass(ev.stageId);
                    divEv.className = `calendar-event project ${stageClass}`;
                    divEv.draggable = true;
                    divEv.textContent = `${ev.projectName} (${ev.stageName})`;
                    divEv.onclick = () => openEditModal(ev.projectId);
                    divEv.addEventListener('dragstart', (e) => {
                        draggedProject = { id: ev.projectId, stageId: ev.stageId };
                        divEv.classList.add('dragging');
                        e.dataTransfer.effectAllowed = 'move';
                    });
                    divEv.addEventListener('dragend', () => {
                        draggedProject = null;
                        divEv.classList.remove('dragging');
                    });
                    div.appendChild(divEv);
                });

                const dayTemps = tempWorks.filter(t => t.date === dateStr);
                dayTemps.forEach(t => {
                    const ev = document.createElement('div');
                    ev.className = 'calendar-event temp';
                    ev.textContent = t.title;
                    ev.onclick = () => openTempDetail(t);
                    div.appendChild(ev);
                });

                // 允许拖放项目到这个日期
                div.addEventListener('dragover', (e) => {
                    e.preventDefault();
                });
                div.addEventListener('drop', (e) => {
                    e.preventDefault();
                    if (draggedProject && draggedProject.id !== undefined && draggedProject.stageId !== undefined) {
                        updateProjectStageDate(draggedProject.id, draggedProject.stageId, dateStr);
                        renderCalendar();
                        renderProjectList();
                        renderKanban();
                    }
                });

                grid.appendChild(div);
            }
        }

        // === 日视图渲染 ===
        function renderDayView() {
            const { year, month, day } = currentDay;
            const date = new Date(year, month, day);
            const dateStr = new Date(date.getTime() - date.getTimezoneOffset() * 60000).toISOString().split('T')[0];

            document.getElementById('calendarMonth').textContent = `${year}年 ${month + 1}月 ${day}日`;

            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = '1fr';

            const allEvents = getAllProjectEvents();
            const tempWorks = getTempWorks();
            const today = new Date();

            let classes = 'calendar-day';
            if (date.getFullYear() === today.getFullYear() &&
                date.getMonth() === today.getMonth() &&
                date.getDate() === today.getDate()) {
                classes += ' today';
            }

            const div = document.createElement('div');
            div.className = classes;
            div.style.minHeight = '400px';
            div.innerHTML = `<div class="day-number" style="margin-bottom: 15px;">${dateStr} <button class="add-temp-btn" onclick="openAddTempWork('${dateStr}')">+</button></div>`;

            // 项目阶段事件按项目分组
            const dayEvents = allEvents.filter(ev => ev.date === dateStr);
            if (dayEvents.length > 0) {
                div.innerHTML += `<div style="margin-bottom: 10px;"><strong>项目计划 (${dayEvents.length})</strong></div>`;
                dayEvents.forEach(ev => {
                    const divEv = document.createElement('div');
                    const stageClass = getStageEventClass(ev.stageId);
                    divEv.className = `calendar-event project ${stageClass}`;
                    divEv.style.fontSize = '14px';
                    divEv.style.padding = '8px';
                    divEv.style.marginBottom = '8px';
                    divEv.draggable = true;
                    divEv.textContent = `${ev.projectName} → ${ev.stageName}`;
                    divEv.onclick = () => openEditModal(ev.projectId);
                    divEv.addEventListener('dragstart', (e) => {
                        draggedProject = { id: ev.projectId, stageId: ev.stageId };
                        divEv.classList.add('dragging');
                        e.dataTransfer.effectAllowed = 'move';
                    });
                    divEv.addEventListener('dragend', () => {
                        draggedProject = null;
                        divEv.classList.remove('dragging');
                    });
                    div.appendChild(divEv);
                });
            }

            const dayTemps = tempWorks.filter(t => t.date === dateStr);
            if (dayTemps.length > 0) {
                div.innerHTML += `<div style="margin: 15px 0 10px 0;"><strong>临时工作 (${dayTemps.length})</strong></div>`;
                dayTemps.forEach(t => {
                    const ev = document.createElement('div');
                    ev.className = 'calendar-event temp';
                    ev.style.fontSize = '14px';
                    ev.style.padding = '8px';
                    ev.style.marginBottom = '8px';
                    ev.textContent = t.title;
                    if (t.note) ev.textContent += ` → ${t.note}`;
                    ev.onclick = () => openTempDetail(t);
                    div.appendChild(ev);
                });
            }

            // 允许拖放项目到这个日期
            div.addEventListener('dragover', (e) => {
                e.preventDefault();
            });
            div.addEventListener('drop', (e) => {
                e.preventDefault();
                if (draggedProject && draggedProject.id !== undefined && draggedProject.stageId !== undefined) {
                    updateProjectStageDate(draggedProject.id, draggedProject.stageId, dateStr);
                    renderCalendar();
                    renderProjectList();
                    renderKanban();
                }
            });

            grid.appendChild(div);
        }

        // === 临时工作 ===
        function openAddTempWork(dateStr) {
            pendingTempDate = dateStr;
            pendingTempEditId = null;
            document.getElementById('tempDate').value = dateStr;
            document.getElementById('tempModalTitle').textContent = `添加当日临时工作`;
            document.getElementById('tempForm').reset();
            document.getElementById('tempModal').classList.add('show');
        }

        function openEditTempWork(t) {
            pendingTempEditId = t.id;
            pendingTempDate = t.date;
            document.getElementById('tempDate').value = t.date;
            document.getElementById('tempTitle').value = t.title;
            document.getElementById('tempNote').value = t.note || '';
            document.getElementById('tempModalTitle').textContent = `编辑临时工作`;
            document.getElementById('tempModal').classList.add('show');
        }

        function closeTempModal() {
            document.getElementById('tempModal').classList.remove('show');
            pendingTempDate = null;
            pendingTempEditId = null;
        }

        function saveTempWork() {
            const dateStr = document.getElementById('tempDate').value.trim();
            const title = document.getElementById('tempTitle').value.trim();
            const note = document.getElementById('tempNote').value.trim();

            if (!title) {
                alert('请输入工作标题');
                return;
            }

            // 校验日期格式 (YYYY-MM-DD)
            if (!/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
                alert('日期格式无效，请使用 YYYY-MM-DD 格式');
                return;
            }

            // 校验日期是否合法
            const date = new Date(dateStr);
            if (isNaN(date.getTime())) {
                alert('日期无效，请检查');
                return;
            }

            const tempWorks = getTempWorks();

            if (pendingTempEditId !== null) {
                // 编辑已有
                const index = tempWorks.findIndex(t => t.id === pendingTempEditId);
                if (index >= 0) {
                    tempWorks[index].date = dateStr;
                    tempWorks[index].title = title;
                    tempWorks[index].note = note;
                    tempWorks[index].updatedAt = getCurrentTime();
                }
            } else {
                // 新建
                tempWorks.push({
                    id: Date.now(),
                    date: dateStr,
                    title: title,
                    note: note,
                    createdAt: getCurrentTime()
                });
            }

            saveTempWorks(tempWorks);
            closeTempModal();
            renderCalendar();
        }

        function openTempDetail(t) {
            // 弹出选项：编辑/删除
            let msg = `临时工作：${t.title}\n`;
            msg += `日期：${t.date}\n`;
            if (t.note) msg += `\n备注：${t.note}\n`;
            msg += `\n创建于：${t.createdAt}`;
            if (t.updatedAt) msg += `\n修改于：${t.updatedAt}`;
            msg += `\n\n请选择操作：\n确定 → 编辑\n取消 → 删除`;

            if (confirm(msg)) {
                // 确定 → 编辑
                openEditTempWork(t);
            } else {
                // 取消 → 删除
                if (confirm('确定要删除这条临时工作吗？')) {
                    const tempWorks = getTempWorks().filter(work => work.id !== t.id);
                    saveTempWorks(tempWorks);
                    renderCalendar();
                }
            }
        }

        // === 导出导入 ===
        function exportData() {
            const data = {
                appVersion: APP_VERSION,
                baseReleaseVersion: BASE_RELEASE_VERSION,
                projects: getProjects(),
                tempWorks: getTempWorks(),
                exportTime: getCurrentTime(),
                exportTimestamp: getCurrentTimestamp()
            };
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `project-management-backup-${new Date().toISOString().slice(0, 10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importJsonData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const content = e.target.result;
                    const data = JSON.parse(content);

                    let projects = [];
                    let tempWorks = [];

                    if (Array.isArray(data)) {
                        // 兼容旧格式只有项目数组
                        projects = data;
                    } else if (data && typeof data === 'object') {
                        // 新格式带projects和tempWorks
                        projects = data.projects || [];
                        tempWorks = data.tempWorks || [];
                    }

                    if (!Array.isArray(projects)) projects = [];
                    if (!Array.isArray(tempWorks)) tempWorks = [];

                    const currentProjects = getProjects();
                    const currentTempWorks = getTempWorks();
                    const mergeResult = smartMergeProjects(currentProjects, projects);
                    const mergedTempWorks = mergeTempWorks(currentTempWorks, tempWorks);

                    if (!confirm(
                        `确认智能导入？\n\n` +
                        `导入项目：${projects.length}\n` +
                        `新增项目：${mergeResult.stats.added}\n` +
                        `合并项目：${mergeResult.stats.merged}\n` +
                        `冲突数量：${mergeResult.conflicts.length}\n` +
                        `临时工作（导入）：${tempWorks.length}\n\n` +
                        `说明：不会直接覆盖现有全部数据，而是按 id 去重并尝试自动合并。`
                    )) {
                        event.target.value = '';
                        return;
                    }

                    const conflictResolution = resolveImportConflicts(mergeResult.projects, mergeResult.conflicts);

                    saveProjects(conflictResolution.projects);
                    saveTempWorks(mergedTempWorks);
                    renderCurrentPage();
                    updateStats();
                    renderCalendar();
                    alert(
                        `导入完成！\n\n` +
                        `新增项目：${mergeResult.stats.added}\n` +
                        `合并项目：${mergeResult.stats.merged}\n` +
                        `冲突手动保留导入：${conflictResolution.keepImportedCount}\n` +
                        `冲突手动保留当前：${conflictResolution.keepCurrentCount}\n` +
                        `临时工作总数：${mergedTempWorks.length}`
                    );
                    event.target.value = '';
                } catch (err) {
                    console.error('Import failed:', err);
                    alert('导入失败：文件格式不正确\n' + err.message);
                    event.target.value = '';
                }
            };
            reader.readAsText(file);
        }

        // === 统计信息 ===
        function updateStats() {
            const projects = getProjects();
            const total = projects.length;
            const completed = projects.filter(p => p.currentStage === 6).length;
            const followUp = projects.filter(p => normalizeProjectFlag(p.projectFlag) === 'follow_up').length;
            const onHold = projects.filter(p => normalizeProjectFlag(p.projectFlag) === 'on_hold').length;
            document.getElementById('stats').innerHTML = `
                <span>总数：${total}</span>
                <span>待完成：${total - completed}</span>
                <span>已完成：${completed}</span>
                <span>跟进：${followUp}</span>
                <span>On Hold：${onHold}</span>
            `;
        }

        // === HTML转义防止XSS ===
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
